	message check_option {
		extend google.protobuf.MethodOptions {
			optional .options.check_option.CheckOption check = 51000;
			optional .options.check_option.ErrorOption error = 51001;
		}

		message CheckOption {
			optional bool disabled_game_auth_token = 1;
			optional bool disabled_master_version = 2;
			optional bool enabled_response_cache = 3;
			optional bool enabled_request_signature = 4;
		}

		message ErrorOption {
			repeated .enums.ErrorCode error_codes = 1;
		}
	}

	message master {
		extend google.protobuf.MessageOptions {
			optional bool table = 51010;
		}

		extend google.protobuf.FieldOptions {
			optional bool pk = 51010;
			optional string fk = 51011;
			optional bool optional = 51012;
		}
	}
}

