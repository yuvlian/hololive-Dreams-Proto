message entity {
	message transaction {
		message UserAppReview {
			optional bool is_displayed = 2;
		}

		message UserBalanceFree {
			optional int32 free_quantity = 1;
		}

		message UserBalancePaid {
			optional int32 paid_quantity = 1;
		}

		message UserCard {
			optional string card_id = 2;
			optional int64 exp = 3;
			optional int32 level_limit_break_count = 4;
			optional int32 potential_upgrade_count = 5;
			optional int32 potential_upgrade_point_quantity = 6;
			optional int64 acquired_time = 7;
		}

		message UserCharacter {
			optional string character_id = 2;
			optional string costume_id = 3;
			optional string sd_costume_id = 4;
			optional string sd_costume_hair_accessory_id = 5;
			optional int64 exp = 6;
			optional int64 highest_live_deck_evaluation_value = 7;
			optional int64 acquired_time = 8;
			optional int32 last_reward_received_level = 11;
			optional int64 read_time = 12;
			optional int64 park_read_time = 13;
		}

		message UserCharacterSkillTree {
			optional string character_id = 2;
			repeated string released_skill_tree_node_group_ids = 3;
			repeated string connected_skill_tree_node_group_ids = 4;
			repeated string connected_skill_tree_node_card_ids = 5;
		}

		message UserChase {
			optional int64 mischief_team_highest_score = 2;
			optional int64 mischief_team_highest_score_last_updated_time = 3;
			optional int64 patrol_team_highest_score = 4;
			optional int64 patrol_team_highest_score_last_updated_time = 5;
			optional int64 play_count = 6;
		}

		message UserCircuit {
			optional int64 best_clear_time_milliseconds = 2;
			optional int64 best_clear_time_last_updated_time = 3;
			optional int64 play_count = 4;
			optional int64 top_rank_count = 5;
		}

		message UserComboCardGameCompletionRole {
			optional string character_grouping_id = 3;
		}

		message UserComboCardGame {
			optional int64 chip_diff_total_quantity = 2;
			optional int64 chip_diff_total_quantity_last_updated_time = 3;
			optional int64 play_count = 4;
			optional int64 highest_score = 5;
			optional int64 before_chip_diff_total_quantity = 7;
			optional int64 highest_score_last_updated_time = 8;
			optional int64 top_rank_count = 101;
			optional int64 second_rank_count = 102;
			optional int64 third_rank_count = 103;
			optional int64 fourth_rank_count = 104;
		}

		message UserCookingPuzzle {
			optional string cooking_puzzle_id = 2;
			optional int64 highest_score = 3;
			optional bool is_cleared = 4;
			optional int64 play_count = 5;
			optional int64 notification_read_time = 7;
		}

		message UserCostume {
			optional string costume_id = 2;
			optional int64 acquired_time = 3;
			optional int64 read_time = 4;
		}

		message UserCount {
			optional .enums.CountType count_type = 2;
			optional int64 total_count = 3;
			optional int64 daily_count = 4;
			optional int64 last_updated_time = 5;
		}

		message UserCustomPaletteDecoration {
			optional string custom_palette_decoration_id = 2;
		}

		message UserCustomPalette {
			optional int32 number = 2;
			optional string image_url = 1000;
			optional bool is_inactivated = 1001;
		}

		message UserEmblem {
			optional string emblem_id = 2;
			optional int64 last_activated_time = 5;
		}

		message UserExchangeBooth {
			optional string exchange_booth_id = 2;
			repeated string exchange_booth_fixed_item_ids = 3;
			repeated int32 purchased_fixed_quantities = 4;
			repeated int64 fixed_item_release_times = 5;
			repeated int64 lottery_item_release_times = 8;
			optional int64 last_reset_time = 9;
			optional int64 read_time = 10;
		}

		message UserFacility {
			optional string facility_id = 2;
			optional int32 current_level = 3;
		}

		message UserFanMark {
			optional string fan_mark_id = 2;
			optional int64 acquired_time = 4;
		}

		message UserGachaButton {
			optional string gacha_button_id = 2;
			optional int32 draw_count = 3;
			optional int64 last_draw_time = 4;
		}

		message User {
