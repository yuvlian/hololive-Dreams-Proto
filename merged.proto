message dto {
	message multi_game_result {
		message MultiGameCommonUserResult {
			message NpcInfo {
				optional string mini_game_npc_id = 1;
				optional string name_suffix = 2;
			}

			optional string public_user_id = 1;
			optional .dto.multi_game_result.MultiGameCommonUserResult.NpcInfo npc_info = 2;
			optional string character_id = 3;
			optional string sd_costume_id = 4;
			optional string sd_costume_hair_accessory_id = 5;
			optional bool is_disconnected = 6;
		}

		message LiveCooperationResult {
			message UserResult {
				optional .enums.MusicDifficultyType music_difficulty_type = 1;
				optional .common.LiveBaseResult result = 2;
				optional int64 bonus_score = 3;
				optional int32 fever_point = 4;
				optional bool is_fever_succeeded = 5;
				optional .dto.multi_game_result.MultiGameCommonUserResult common_user_result = 100;
			}

			optional string music_id = 1;
			repeated .dto.multi_game_result.LiveCooperationResult.UserResult user_results = 2;
			optional bool is_fever_succeeded = 3;
			optional bool is_auto_play_allowed = 4;
		}

		message MiniGameCircuitResult {
			message RankResult {
				optional int32 rank = 1;
				optional int64 clear_time_milliseconds = 2;
				repeated .dto.multi_game_result.MiniGameCircuitResult.AreaInfo area_infos = 3;
				repeated int64 area_pass_milliseconds = 50;
				repeated int32 dash_counts = 51;
				optional .enums.CheatSeverityType cheat_severity_type = 52;
				optional .dto.multi_game_result.MultiGameCommonUserResult common_user_result = 100;
			}

			message AreaInfo {
				optional .enums.CircuitAreaType area_type = 1;
				optional int32 fall_count = 2;
				optional int32 crash_count = 3;
				optional int32 damage_count = 4;
			}

			repeated .dto.multi_game_result.MiniGameCircuitResult.RankResult rank_results = 1;
		}

		message MiniGameComboCardGameResult {
			message RankResult {
				optional int32 rank = 1;
				optional int64 end_chip_quantity = 2;
				optional int64 start_bet_coin_quantity = 3;
				optional int32 ronned_count = 4;
				optional int32 mismatch_count = 5;
				repeated .dto.multi_game_result.MiniGameComboCardGameResult.CompletionRole completion_roles = 6;
				optional .dto.multi_game_result.MultiGameCommonUserResult common_user_result = 100;
			}

			message CompletionRole {
				optional .enums.ComboCardGameCardRoleType role_type = 1;
				optional string character_grouping_id = 2;
				optional string character_id = 3;
				optional bool is_same_category = 4;
			}

			repeated .dto.multi_game_result.MiniGameComboCardGameResult.RankResult rank_results = 1;
			optional int32 deck_remaining_card_count = 2;
		}

		message MiniGameJumpRopeResult {
			message UserResult {
				optional int32 continuous_jump_count = 1;
				optional int32 success_jump_count = 2;
				optional int32 failure_jump_count = 3;
				optional int64 gimmick_random_seed = 50;
				optional .dto.multi_game_result.MultiGameCommonUserResult common_user_result = 100;
			}

			optional int32 total_jump_count = 1;
			repeated .dto.multi_game_result.MiniGameJumpRopeResult.UserResult user_results = 2;
		}
	}
}

