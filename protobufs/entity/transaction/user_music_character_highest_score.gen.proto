syntax = "proto3";

import "entity/master/options/master.proto";
import "entity/transaction/options/transaction.proto";
import "enums/music_difficulty_type.gen.proto";

package entity.transaction;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/transaction";
option csharp_namespace = "Vision.Common.Proto.Transaction";

message UserMusicCharacterHighestScore {
	message HighestScoreInfo {
		.enums.MusicDifficultyType difficulty_type = 1;
		int64 highest_score = 2;
		int64 highest_score_rating_value = 3;
		int64 highest_score_last_updated_time = 4;
	}

	string character_id = 2 [(options.transaction.pk) = true, (options.master.fk) = "Character:id"];
	string music_id = 3 [(options.transaction.pk) = true, (options.master.fk) = "Music:id"];
	repeated UserMusicCharacterHighestScore.HighestScoreInfo highest_score_infos = 100;
}
