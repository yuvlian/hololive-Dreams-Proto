syntax = "proto3";

import "entity/master/options/master.proto";
import "entity/transaction/options/transaction.proto";

package entity.transaction;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/transaction";
option csharp_namespace = "Vision.Common.Proto.Transaction";

message UserParkAreaSelector {
	string area_selector_id = 2 [(options.transaction.pk) = true, (options.master.fk) = "AreaSelector:id"];
	string selected_area_id = 3 [(options.master.fk) = "Area:id"];
}
