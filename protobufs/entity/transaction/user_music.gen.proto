syntax = "proto3";

import "entity/master/options/master.proto";
import "entity/transaction/options/transaction.proto";
import "enums/live_evaluation_rank_type.gen.proto";
import "enums/music_difficulty_type.gen.proto";

package entity.transaction;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/transaction";
option csharp_namespace = "Vision.Common.Proto.Transaction";

message UserMusic {
	string music_id = 2 [(options.transaction.pk) = true, (options.master.fk) = "Music:id"];
	bool is_favorite = 3;
	int64 released_time = 8;
	int64 highest_score = 100;
	int64 highest_score_last_updated_time = 101;
	.enums.MusicDifficultyType highest_score_music_difficulty_type = 102;
	string highest_score_character_id = 103 [(options.master.fk) = "Character:id"];
	string highest_score_costume_id = 104 [(options.master.fk) = "Costume:id"];
	repeated string highest_score_deck_card_ids = 105 [(options.master.fk) = "Card:id"];
	repeated int32 highest_score_deck_card_levels = 106;
	repeated int32 highest_score_deck_card_potential_upgrade_counts = 107;
	repeated int64 highest_score_deck_card_live_deck_powers = 108;
	repeated int64 highest_score_deck_card_parameters_for_card_detail = 109;
	repeated int64 highest_score_deck_card_performances_for_card_detail = 110;
	repeated int64 highest_score_deck_card_techniques_for_card_detail = 111;
	repeated int64 highest_score_deck_card_senses_for_card_detail = 112;
	int64 highest_score_deck_power = 113;
	int64 highest_score_deck_evaluation_value = 114;
	.enums.LiveEvaluationRankType received_highest_score_evaluation_rank_reward_rank_type = 115;
}
