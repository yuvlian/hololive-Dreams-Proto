syntax = "proto3";

import "entity/master/options/master.proto";
import "entity/transaction/options/transaction.proto";

package entity.transaction;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/transaction";
option csharp_namespace = "Vision.Common.Proto.Transaction";

message UserCharacter {
	string character_id = 2 [(options.transaction.pk) = true, (options.master.fk) = "Character:id"];
	string costume_id = 3 [(options.master.fk) = "Costume:id"];
	string sd_costume_id = 4 [(options.master.fk) = "SdCostume:id"];
	string sd_costume_hair_accessory_id = 5 [(options.master.fk) = "SdCostumeHairAccessory:id"];
	int64 exp = 6;
	int64 highest_live_deck_evaluation_value = 7;
	int64 acquired_time = 8;
	int32 last_reward_received_level = 11;
	int64 read_time = 12;
	int64 park_read_time = 13;
}
