syntax = "proto3";

package entity.transaction;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/transaction";
option csharp_namespace = "Vision.Common.Proto.Transaction";

message UserChase {
	int64 mischief_team_highest_score = 2;
	int64 mischief_team_highest_score_last_updated_time = 3;
	int64 patrol_team_highest_score = 4;
	int64 patrol_team_highest_score_last_updated_time = 5;
	int64 play_count = 6;
}
