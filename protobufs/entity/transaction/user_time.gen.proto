syntax = "proto3";

import "enums/os_type.gen.proto";

package entity.transaction;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/transaction";
option csharp_namespace = "Vision.Common.Proto.Transaction";

message UserTime {
	int64 game_start_time = 2;
	int64 last_login_time = 3;
	int64 force_relogin_flag_set_time = 4;
	.enums.OsType last_login_os = 5;
	int64 comebacked_time = 6;
}
