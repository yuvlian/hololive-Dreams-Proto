syntax = "proto3";

import "entity/master/options/master.proto";
import "entity/transaction/options/transaction.proto";

package entity.transaction;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/transaction";
option csharp_namespace = "Vision.Common.Proto.Transaction";

message UserParkRandomSymbol {
	string area_id = 2 [(options.transaction.pk) = true, (options.master.fk) = "Area:id"];
	repeated string collected_park_target_mapping_ids = 3 [(options.master.fk) = "ParkTargetMapping:id"];
	repeated string picked_park_target_mapping_ids = 4 [(options.master.fk) = "ParkTargetMapping:id"];
	int64 last_refreshed_time = 5;
}
