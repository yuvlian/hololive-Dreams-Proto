syntax = "proto3";

import "entity/master/options/master.proto";

package entity.transaction;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/transaction";
option csharp_namespace = "Vision.Common.Proto.Transaction";

message UserPark {
	int32 time_point = 2;
	string current_area_id = 3 [(options.master.fk) = "Area:id"];
	repeated string picked_character_quest_start_park_permanence_ids = 4 [(options.master.fk) = "ParkPermanence:id"];
	repeated string force_activated_character_quest_start_park_permanence_ids = 5 [(options.master.fk) = "ParkPermanence:id"];
	string initial_park_character_id = 6 [(options.master.fk) = "Character:id"];
	int64 character_quest_last_picked_time = 7;
	string picked_daily_park_quest_id = 8 [(options.master.fk) = "ParkQuest:id"];
	int64 daily_quest_last_picked_time = 9;
	repeated int32 received_player_level_reward_levels = 10;
	repeated string present_received_park_permanence_ids = 11 [(options.master.fk) = "ParkPermanence:id"];
	string last_cleared_main_park_quest_id = 100 [(options.master.fk) = "ParkQuest:id"];
	int64 last_cleared_main_park_quest_step_group_number = 101;
	int64 last_cleared_main_park_quest_step = 102;
}
