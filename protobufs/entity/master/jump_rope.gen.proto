syntax = "proto3";

import "common/reward.gen.proto";
import "entity/master/options/master.proto";
import "enums/jump_rope_play_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message JumpRope {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	.enums.JumpRopePlayType play_type = 2;
	string view_condition_group_id = 3 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	string unlock_condition_group_id = 4 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	string jump_rope_phase_gimmick_group_id = 5 [(options.master.fk) = "JumpRopePhaseGimmick:group_id"];
	string jump_rope_jump_count_reward_group_id = 7 [(options.master.fk) = "JumpRopeJumpCountReward:group_id", (options.master.optional) = true];
	int32 npc_count = 9 [(options.master.optional) = true];
	string game_start_display_clear_condition_lang_id = 11 [(options.master.fk) = "LangJumpRope:id"];
	string game_playing_display_clear_condition_lang_id = 12 [(options.master.fk) = "LangJumpRope:id"];
	string mode_select_display_clear_condition_lang_id = 13 [(options.master.fk) = "LangJumpRope:id", (options.master.optional) = true];
	int32 order = 999;
	repeated .common.SimplifiedReward play_rewards = 1000 [(options.master.optional) = true];
	repeated .common.SimplifiedReward multi_mvp_rewards = 1001 [(options.master.optional) = true];
}
