syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/park_quest_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message ParkQuest {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	string park_quest_chapter_id = 2 [(options.master.fk) = "ParkQuestChapter:id"];
	int32 number = 3;
	string title_lang_id = 4 [(options.master.fk) = "LangParkQuest:id"];
	string description_lang_id = 5 [(options.master.fk) = "LangParkQuest:id", (options.master.optional) = true];
	.enums.ParkQuestType type = 6;
	string play_character_id = 7 [(options.master.fk) = "Character:id", (options.master.optional) = true];
	int32 priority = 8;
	string area_grouping_id = 9 [(options.master.fk) = "AreaGrouping:id"];
	int32 ratio = 10;
	string view_condition_group_id = 11 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	string unlock_condition_group_id = 12 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	string park_target_mapping_id = 13 [(options.master.fk) = "ParkTargetMapping:id", (options.master.optional) = true];
	int32 order = 999;
}
