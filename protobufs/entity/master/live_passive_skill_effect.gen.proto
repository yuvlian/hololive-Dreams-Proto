syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/live_passive_skill_effect_type.gen.proto";
import "enums/resource_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message LivePassiveSkillEffect {
	option (options.master.table) = true;

	string group_id = 1 [(options.master.pk) = true];
	int32 number = 2 [(options.master.pk) = true];
	.enums.LivePassiveSkillEffectType type = 3;
	int64 value = 4 [(options.master.optional) = true];
	string live_skill_effect_target_id = 5 [(options.master.fk) = "LiveSkillEffectTarget:id", (options.master.optional) = true];
	.enums.ResourceType resource_type = 6 [(options.master.optional) = true];
	repeated string resource_ids = 7 [(options.master.optional) = true];
	string description_lang_id = 1000 [(options.master.fk) = "LangGeneratedLivePassiveSkillEffect:id"];
}
