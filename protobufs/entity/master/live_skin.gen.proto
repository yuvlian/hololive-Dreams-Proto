syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/live_skin_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message LiveSkin {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	.enums.LiveSkinType skin_type = 2;
	string name_lang_id = 3 [(options.master.fk) = "LangLiveSkin:id"];
	string description_lang_id = 4 [(options.master.fk) = "LangLiveSkin:id"];
	string character_production_id = 5 [(options.master.fk) = "CharacterProduction:id", (options.master.optional) = true];
	string asset_id1 = 6;
	string asset_id2 = 7 [(options.master.optional) = true];
	string thumbnail_asset_id = 8 [(options.master.optional) = true];
	string icon_asset_id = 9 [(options.master.optional) = true];
	bool is_default = 10 [(options.master.optional) = true];
	string default_character_effect_live_skin_id = 11 [(options.master.fk) = "LiveSkin:id", (options.master.optional) = true];
	string color1 = 100 [(options.master.optional) = true];
	string color2 = 101 [(options.master.optional) = true];
	string color3 = 102 [(options.master.optional) = true];
	int32 order = 999;
}
