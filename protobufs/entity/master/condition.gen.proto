syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/condition_min_max_type.gen.proto";
import "enums/condition_operator_type.gen.proto";
import "enums/condition_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message Condition {
	option (options.master.table) = true;

	string group_id = 1 [(options.master.pk) = true];
	int32 number = 2 [(options.master.pk) = true];
	.enums.ConditionOperatorType operator_type = 3 [(options.master.optional) = true];
	.enums.ConditionType type = 4;
	string resource_id1 = 5 [(options.master.optional) = true];
	string resource_id2 = 6 [(options.master.optional) = true];
	.enums.ConditionMinMaxType min_max_type = 7 [(options.master.optional) = true];
	int64 min = 8 [(options.master.optional) = true];
	int64 max = 9 [(options.master.optional) = true];
	int64 start_time = 10 [(options.master.optional) = true];
	int64 end_time = 11 [(options.master.optional) = true];
	string description_lang_id = 12 [(options.master.fk) = "LangCondition:id", (options.master.optional) = true];
	string detail_description_lang_id = 13 [(options.master.fk) = "LangCondition:id", (options.master.optional) = true];
}
