syntax = "proto3";

import "entity/master/options/master.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message ComboCardGameSetting {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	int32 max_user_count = 10;
	int32 bet_coin_rank_bonus_threshold_score = 12;
	int32 start_chip_quantity = 13;
	int32 discard_card_personal_hold_seconds = 15;
	int32 ron_personal_hold_seconds = 16;
	int32 tsumo_personal_hold_seconds = 17;
	int32 personal_hold_seconds = 18;
	int32 same_card_count = 19;
	int32 character_bonus_chip_quantity = 20;
	int32 deck_character_grouping_count = 21;
	int32 random_match_min_user_count = 22;
	int32 private_room_min_user_count = 23;
	string mini_game_bet_coin_consumption_group_id = 24 [(options.master.fk) = "MiniGameBetCoinConsumption:group_id"];
	int32 random_match_start_time_limit_seconds = 25;
	int32 warning_remaining_card_count = 27;
	int32 multi_game_setup_time_limit_seconds = 28;
}
