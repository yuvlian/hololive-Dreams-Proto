syntax = "proto3";

import "entity/master/options/master.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message ParkAccessory {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	string character_id = 2 [(options.master.fk) = "Character:id", (options.master.optional) = true];
	string name_lang_id = 3 [(options.master.fk) = "LangParkAccessory:id"];
	string asset_id = 4;
	string thumbnail_asset_id = 5 [(options.master.optional) = true];
	string park_character_shop_thumbnail_asset_id = 6 [(options.master.optional) = true];
	repeated string reward_park_emotion_ids = 7 [(options.master.fk) = "ParkEmotion:id", (options.master.optional) = true];
	int32 order = 999;
}
