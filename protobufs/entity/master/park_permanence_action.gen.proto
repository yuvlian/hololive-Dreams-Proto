syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/park_action_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message ParkPermanenceAction {
	option (options.master.table) = true;

	string park_permanence_id = 1 [(options.master.pk) = true, (options.master.fk) = "ParkPermanence:id"];
	int32 action_number = 2 [(options.master.pk) = true];
	string description_lang_id = 3 [(options.master.fk) = "LangParkPermanenceAction:id", (options.master.optional) = true];
	.enums.ParkActionType type = 4;
	string condition_group_id = 5 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	string before_park_talk_group_id = 6 [(options.master.fk) = "ParkTalk:group_id", (options.master.optional) = true];
	string after_park_talk_group_id = 7 [(options.master.fk) = "ParkTalk:group_id", (options.master.optional) = true];
	string facility_id = 8 [(options.master.fk) = "Facility:id", (options.master.optional) = true];
	int32 facility_level = 9 [(options.master.optional) = true];
	string present_reward_group_id = 10 [(options.master.fk) = "Reward:group_id", (options.master.optional) = true];
	string park_character_shop_id = 11 [(options.master.fk) = "ParkCharacterShop:id", (options.master.optional) = true];
	string park_lottery_id = 12 [(options.master.fk) = "ParkLottery:id", (options.master.optional) = true];
	string character_park_quest_id = 13 [(options.master.fk) = "ParkQuest:id", (options.master.optional) = true];
	string park_high_low_id = 14 [(options.master.fk) = "ParkHighLow:id", (options.master.optional) = true];
	string exchange_booth_group_id = 15 [(options.master.fk) = "ExchangeBoothGroup:id", (options.master.optional) = true];
	string mini_game_reward_up_stamina_conversion_id = 16 [(options.master.fk) = "MiniGameRewardUpStaminaConversion:id", (options.master.optional) = true];
	string park_fishing_spot_group_id = 30 [(options.master.fk) = "ParkFishingSpot:group_id", (options.master.optional) = true];
}
