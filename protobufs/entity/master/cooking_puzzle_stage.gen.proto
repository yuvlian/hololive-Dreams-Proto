syntax = "proto3";

import "entity/master/options/master.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message CookingPuzzleStage {
	option (options.master.table) = true;

	string cooking_puzzle_id = 1 [(options.master.pk) = true, (options.master.fk) = "CookingPuzzle:id"];
	int32 number = 2 [(options.master.pk) = true];
	string cooking_puzzle_stage_pattern_group_id = 3 [(options.master.fk) = "CookingPuzzleStagePattern:group_id"];
	int64 score = 4 [(options.master.optional) = true];
}
