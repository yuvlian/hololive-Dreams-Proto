syntax = "proto3";

import "common/reward.gen.proto";
import "entity/master/options/master.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message MissionPassLevel {
	option (options.master.table) = true;

	string group_id = 1 [(options.master.pk) = true];
	int32 level = 2 [(options.master.pk) = true];
	bool is_feature = 3 [(options.master.optional) = true];
	repeated .common.Reward normal_rewards = 1000 [(options.master.optional) = true];
	repeated .common.Reward premium_rewards = 1001 [(options.master.optional) = true];
}
