syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/gacha_animation_rarity_type.gen.proto";
import "enums/gacha_animation_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message GachaAnimationTransition {
	option (options.master.table) = true;

	string gacha_animation_grouping_id = 1 [(options.master.pk) = true, (options.master.fk) = "GachaAnimationGrouping:id"];
	.enums.GachaAnimationRarityType animation_rarity = 2 [(options.master.pk) = true];
	.enums.GachaAnimationType animation_type_from = 3 [(options.master.pk) = true];
	int32 animation_number_from = 4 [(options.master.pk) = true, (options.master.optional) = true];
	.enums.GachaAnimationType animation_type_to = 5 [(options.master.pk) = true];
	int32 animation_number_to = 6 [(options.master.pk) = true, (options.master.optional) = true];
	int32 ratio = 7 [(options.master.optional) = true];
}
