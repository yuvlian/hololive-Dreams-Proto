syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/mission_category_type.gen.proto";
import "enums/mission_type.gen.proto";
import "enums/transition_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message Mission {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	string mission_group_id = 2 [(options.master.fk) = "MissionGroup:id", (options.master.optional) = true];
	string achievement_group_id = 3 [(options.master.fk) = "AchievementGroup:id", (options.master.optional) = true];
	string name_lang_id = 4 [(options.master.fk) = "LangMission:id", (options.master.optional) = true];
	string unprogressed_name_lang_id = 5 [(options.master.fk) = "LangMission:id", (options.master.optional) = true];
	string description_lang_id = 6 [(options.master.fk) = "LangMission:id", (options.master.optional) = true];
	string progress_condition_group_id = 7 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	string view_condition_group_id = 8 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	.enums.MissionCategoryType category_type = 9;
	.enums.MissionType type = 10;
	string character_id = 11 [(options.master.fk) = "Character:id", (options.master.optional) = true];
	repeated string target_ids1 = 12 [(options.master.optional) = true];
	repeated string target_ids2 = 13 [(options.master.optional) = true];
	repeated string target_ids3 = 14 [(options.master.optional) = true];
	.enums.TransitionType navigation_transition_type = 15 [(options.master.optional) = true];
	string navigation_transition_id = 17 [(options.master.optional) = true];
	int32 order = 999;
}
