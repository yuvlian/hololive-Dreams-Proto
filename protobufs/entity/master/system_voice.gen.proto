syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/game_screen_type.gen.proto";
import "enums/system_voice_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message SystemVoice {
	option (options.master.table) = true;

	.enums.GameScreenType game_screen_type = 1 [(options.master.pk) = true];
	.enums.SystemVoiceType type = 2 [(options.master.pk) = true];
	string character_voice_id = 3 [(options.master.pk) = true, (options.master.fk) = "CharacterVoice:id"];
	string condition_group_id = 4 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	int32 ratio = 5;
}
