syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/costume_rarity_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message Costume {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	string character_id = 2 [(options.master.fk) = "Character:id"];
	string name_lang_id = 3 [(options.master.fk) = "LangCostume:id"];
	string live_leader_skill_id = 4 [(options.master.fk) = "LiveLeaderSkill:id", (options.master.optional) = true];
	string asset_id = 5;
	string expression_asset_id = 6;
	string live_start_character_voice_id = 7 [(options.master.fk) = "CharacterVoice:id", (options.master.optional) = true];
	.enums.CostumeRarityType rarity_type = 8;
	int32 order = 999;
}
