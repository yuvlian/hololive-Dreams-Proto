syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/tutorial_navigation_type.gen.proto";
import "enums/tutorial_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message Tutorial {
	option (options.master.table) = true;

	.enums.TutorialType type = 1 [(options.master.pk) = true];
	int32 step = 2 [(options.master.pk) = true];
	string unlock_condition_group_id = 4 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	.enums.TutorialNavigationType navigation_type = 5 [(options.master.optional) = true];
	repeated string description_lang_ids = 6 [(options.master.fk) = "LangTutorial:id", (options.master.optional) = true];
	string tips_id = 7 [(options.master.fk) = "Tips:id", (options.master.optional) = true];
	string adv_asset_id = 8 [(options.master.optional) = true];
}
