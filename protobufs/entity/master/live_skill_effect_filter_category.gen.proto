syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/live_active_skill_effect_type.gen.proto";
import "enums/live_passive_skill_effect_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message LiveSkillEffectFilterCategory {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	string name_lang_id = 2 [(options.master.fk) = "LangLiveSkillEffectFilterCategory:id"];
	repeated .enums.LiveActiveSkillEffectType live_active_skill_effect_types = 3 [(options.master.optional) = true];
	repeated .enums.LivePassiveSkillEffectType live_passive_skill_effect_types = 4 [(options.master.optional) = true];
	repeated .enums.LiveActiveSkillEffectType live_special_skill_effect_types = 5 [(options.master.optional) = true];
	int32 order = 999;
}
