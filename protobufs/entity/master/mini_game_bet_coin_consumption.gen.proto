syntax = "proto3";

import "entity/master/options/master.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message MiniGameBetCoinConsumption {
	option (options.master.table) = true;

	string group_id = 1 [(options.master.pk) = true];
	int32 priority = 2 [(options.master.pk) = true];
	string condition_group_id = 3 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	int32 min_quantity = 4;
	int32 max_quantity = 5;
}
