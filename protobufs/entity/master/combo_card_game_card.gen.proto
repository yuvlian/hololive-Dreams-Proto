syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/combo_card_game_card_category_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message ComboCardGameCard {
	option (options.master.table) = true;

	string group_id = 1 [(options.master.pk) = true];
	string character_id = 2 [(options.master.pk) = true, (options.master.fk) = "Character:id"];
	.enums.ComboCardGameCardCategoryType category_type = 3 [(options.master.pk) = true];
	string asset_id = 4;
	string character_grouping_id = 5 [(options.master.pk) = true, (options.master.fk) = "CharacterGrouping:id"];
}
