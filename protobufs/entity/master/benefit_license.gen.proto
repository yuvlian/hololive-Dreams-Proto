syntax = "proto3";

import "common/reward.gen.proto";
import "entity/master/options/master.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message BenefitLicense {
	option (options.master.table) = true;

	string shop_charge_item_subscription_shop_charge_item_id = 1 [(options.master.pk) = true, (options.master.fk) = "ShopChargeItemSubscription:shop_charge_item_id"];
	int32 live_reward_quantity_up_permil_up = 5 [(options.master.optional) = true];
	int32 mini_game_reward_quantity_up_permil_up = 6 [(options.master.optional) = true];
	int32 live_reward_up_stamina_max_quantity_up = 7 [(options.master.optional) = true];
	int32 mini_game_reward_up_stamina_max_quantity_up = 8 [(options.master.optional) = true];
	repeated .common.Reward rewards = 1001 [(options.master.optional) = true];
}
