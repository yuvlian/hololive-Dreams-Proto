syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/custom_palette_decoration_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message CustomPaletteDecoration {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	.enums.CustomPaletteDecorationType custom_palette_decoration_type = 2;
	string name_lang_id = 3 [(options.master.fk) = "LangCustomPaletteDecoration:id"];
	string asset_id = 4;
	bool is_preset = 5 [(options.master.optional) = true];
	int32 order = 999;
}
