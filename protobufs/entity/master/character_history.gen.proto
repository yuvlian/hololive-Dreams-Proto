syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/character_history_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message CharacterHistory {
	option (options.master.table) = true;

	.enums.CharacterHistoryType character_history_type = 1 [(options.master.pk) = true];
	int64 threshold = 2 [(options.master.optional) = true];
	bool is_loop = 3 [(options.master.optional) = true];
	string text_lang_id = 4 [(options.master.fk) = "LangCharacterHistory:id"];
	int32 order = 999 [(options.master.pk) = true];
}
