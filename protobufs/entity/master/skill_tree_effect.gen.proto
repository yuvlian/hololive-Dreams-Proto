syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/mini_game_type.gen.proto";
import "enums/resource_type.gen.proto";
import "enums/skill_tree_effect_character_trigger_type.gen.proto";
import "enums/skill_tree_effect_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message SkillTreeEffect {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	.enums.SkillTreeEffectType effect_type = 2;
	int64 value = 3 [(options.master.optional) = true];
	string skill_tree_effect_target_id = 4 [(options.master.fk) = "SkillTreeEffectTarget:id", (options.master.optional) = true];
	string skill_tree_effect_passive_trigger_group_id = 5 [(options.master.fk) = "SkillTreeEffectPassiveTrigger:group_id", (options.master.optional) = true];
	.enums.SkillTreeEffectCharacterTriggerType character_trigger_type = 6;
	string live_active_skill_id = 7 [(options.master.fk) = "LiveActiveSkill:id", (options.master.optional) = true];
	.enums.ResourceType resource_type = 8 [(options.master.optional) = true];
	repeated string resource_ids = 9 [(options.master.optional) = true];
	repeated .enums.MiniGameType mini_game_types = 10 [(options.master.optional) = true];
	string name_lang_id = 11 [(options.master.fk) = "LangSkillTreeEffect:id"];
	string icon_asset_id_suffix = 13 [(options.master.optional) = true];
	string description_lang_id = 1000 [(options.master.fk) = "LangGeneratedSkillTreeEffect:id"];
}
