syntax = "proto3";

import "entity/master/options/master.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message ResourceObtainmentRoute {
	option (options.master.table) = true;

	string group_id = 1 [(options.master.pk) = true];
	int32 number = 2 [(options.master.pk) = true];
	string description_lang_id = 3 [(options.master.fk) = "LangResourceObtainmentRoute:id", (options.master.optional) = true];
	string facility_id = 4 [(options.master.fk) = "Facility:id", (options.master.optional) = true];
	string condition_group_id = 5 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
}
