syntax = "proto3";

import "entity/master/options/master.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message LiveActiveSkillLevel {
	option (options.master.table) = true;

	string live_active_skill_id = 1 [(options.master.pk) = true, (options.master.fk) = "LiveActiveSkill:id"];
	int32 level = 2 [(options.master.pk) = true];
	string live_skill_trigger_group_id = 3 [(options.master.fk) = "LiveSkillTrigger:group_id", (options.master.optional) = true];
	string live_active_skill_effect_group_id = 4 [(options.master.fk) = "LiveActiveSkillEffect:group_id"];
	string additional_live_skill_trigger_group_id = 5 [(options.master.fk) = "LiveSkillTrigger:group_id", (options.master.optional) = true];
	string additional_live_active_skill_effect_group_id = 6 [(options.master.fk) = "LiveActiveSkillEffect:group_id", (options.master.optional) = true];
	int32 cool_time_millisecond = 7 [(options.master.optional) = true];
	int32 activation_probability_permil_multiply = 8 [(options.master.optional) = true];
	int32 limit_count = 9 [(options.master.optional) = true];
	int32 effect_duration_millisecond = 10 [(options.master.optional) = true];
	string description_lang_id = 1000 [(options.master.fk) = "LangGeneratedLiveActiveSkillLevel:id"];
}
