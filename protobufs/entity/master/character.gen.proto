syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/character_hand_type.gen.proto";
import "enums/character_personality_type.gen.proto";
import "enums/character_sd_personality_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message Character {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	string name_lang_id = 2 [(options.master.fk) = "LangCharacter:id"];
	string short_name_lang_id = 3 [(options.master.fk) = "LangCharacter:id"];
	string name_eng = 4;
	string short_name_eng = 5;
	string character_production_id = 6 [(options.master.fk) = "CharacterProduction:id", (options.master.optional) = true];
	string default_costume_id = 7 [(options.master.fk) = "Costume:id"];
	string default_sd_costume_id = 8 [(options.master.fk) = "SdCostume:id"];
	int32 birth_month = 9;
	int32 birth_day = 10;
	int32 debut_year = 11;
	int32 debut_month = 12;
	int32 debut_day = 13;
	string fan_name_lang_id = 14 [(options.master.fk) = "LangCharacter:id", (options.master.optional) = true];
	string description_lang_id = 15 [(options.master.fk) = "LangCharacter:id", (options.master.optional) = true];
	string comment_lang_id = 16 [(options.master.fk) = "LangCharacter:id", (options.master.optional) = true];
	string youtube_url = 17 [(options.master.optional) = true];
	string x_url = 18 [(options.master.optional) = true];
	.enums.CharacterPersonalityType personality_type = 19 [(options.master.optional) = true];
	.enums.CharacterSdPersonalityType sd_personality_type = 20 [(options.master.optional) = true];
	bool is_playable = 21 [(options.master.optional) = true];
	string asset_id = 22;
	string character_level_group_id = 23 [(options.master.fk) = "CharacterLevel:group_id", (options.master.optional) = true];
	string skill_tree_node_position_group_id = 24 [(options.master.fk) = "SkillTreeNodePosition:group_id", (options.master.optional) = true];
	bool is_tutorial = 25 [(options.master.optional) = true];
	.enums.CharacterHandType dominant_hand_type = 26;
	string skill_tree_point_id = 27 [(options.master.fk) = "SkillTreePoint:id", (options.master.optional) = true];
	string bgm_asset_id = 28 [(options.master.optional) = true];
	string regular_character_grouping_name_lang_id = 29 [(options.master.fk) = "LangCharacter:id", (options.master.optional) = true];
	string regular_character_grouping_name_eng = 30 [(options.master.optional) = true];
	repeated string search_keyword_lang_ids = 31 [(options.master.fk) = "LangCharacter:id"];
	string color1 = 100 [(options.master.optional) = true];
	string color2 = 101 [(options.master.optional) = true];
	string color3 = 102 [(options.master.optional) = true];
	string color4 = 103 [(options.master.optional) = true];
	int32 order = 999;
	repeated string regular_character_grouping_ids = 1000 [(options.master.fk) = "CharacterGrouping:id", (options.master.optional) = true];
}
