syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/live_active_skill_effect_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message LiveActiveSkillEffect {
	option (options.master.table) = true;

	string group_id = 1 [(options.master.pk) = true];
	int32 number = 2 [(options.master.pk) = true];
	.enums.LiveActiveSkillEffectType type = 3;
	int64 value = 4 [(options.master.optional) = true];
	int32 score_up_based_on_parameter_permil_multiply = 5 [(options.master.optional) = true];
	string description_lang_id = 1000 [(options.master.fk) = "LangGeneratedLiveActiveSkillEffect:id"];
}
