syntax = "proto3";

import "entity/master/options/master.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message Area {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	string area_selector_id = 2 [(options.master.fk) = "AreaSelector:id"];
	int32 priority = 3;
	string name_lang_id = 4 [(options.master.fk) = "LangArea:id"];
	string description_lang_id = 5 [(options.master.fk) = "LangArea:id"];
	string view_condition_group_id = 6 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	string unlock_condition_group_id = 7 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	int32 order = 999;
}
