syntax = "proto3";

import "entity/master/options/master.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message MainStory {
	option (options.master.table) = true;

	string main_story_chapter_id = 1 [(options.master.pk) = true, (options.master.fk) = "MainStoryChapter:id"];
	int32 number = 2 [(options.master.pk) = true];
	string title_lang_id = 3 [(options.master.fk) = "LangMainStory:id"];
	string story_id = 4 [(options.master.fk) = "Story:id"];
	string archive_view_condition_group_id = 5 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	string unlock_condition_group_id = 6 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
}
