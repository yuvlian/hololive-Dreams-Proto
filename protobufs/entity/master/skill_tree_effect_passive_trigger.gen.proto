syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/card_attribute_type.gen.proto";
import "enums/music_singer_type.gen.proto";
import "enums/skill_tree_effect_passive_trigger_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message SkillTreeEffectPassiveTrigger {
	option (options.master.table) = true;

	string group_id = 1 [(options.master.pk) = true];
	int32 number = 2 [(options.master.pk) = true];
	.enums.SkillTreeEffectPassiveTriggerType type = 3;
	int64 threshold = 4 [(options.master.optional) = true];
	repeated string character_ids = 5 [(options.master.fk) = "Character:id", (options.master.optional) = true];
	string character_grouping_id = 6 [(options.master.fk) = "CharacterGrouping:id", (options.master.optional) = true];
	string music_id = 7 [(options.master.fk) = "Music:id", (options.master.optional) = true];
	.enums.CardAttributeType card_attribute_type = 8 [(options.master.optional) = true];
	.enums.MusicSingerType music_singer_type = 9 [(options.master.optional) = true];
	string description_lang_id = 1000 [(options.master.fk) = "LangGeneratedSkillTreeEffectPassiveTrigger:id"];
}
