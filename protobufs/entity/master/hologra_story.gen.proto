syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/story_asset_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message HolograStory {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	string title_lang_id = 2 [(options.master.fk) = "LangHolograStory:id"];
	string story_id = 3 [(options.master.fk) = "Story:id"];
	string asset_id = 4;
	.enums.StoryAssetType asset_type = 5;
	int64 start_time = 6;
	int32 order = 999;
}
