	string id = 1 [(options.master.pk) = true];
	int32 max_user_count = 10;
	int32 random_match_min_user_count = 11;
	int32 private_room_min_user_count = 12;
	int32 random_match_start_time_limit_seconds = 13;
	int32 multi_game_setup_time_limit_seconds = 14;
	string mini_game_reward_up_stamina_effect_group_id = 100 [(options.master.fk) = "MiniGameRewardUpStaminaEffect:group_id"];
	int32 mini_game_reward_up_stamina_consumption_unit = 101;
	int32 limit_time_seconds = 102;
	int32 mischief_team_user_count = 200;
	float mischief_team_move_speed = 201;
	float mischief_team_view_range = 202;
	int32 mischief_team_rescue_milliseconds = 203;
	float mischief_team_rescue_range = 204;
	int32 mischief_team_rescue_invincible_milliseconds = 205;
	int32 mischief_team_max_key_count_per_user = 206;
	int32 mischief_team_key_move_speed_permil_down = 207;
	float mischief_team_key_use_range = 208;
	float mischief_team_vignette_size = 209;
	bool mischief_team_end_game_rescue_element_enabled = 210;
	int32 patrol_team_user_count = 300;
	float patrol_team_move_speed = 301;
	float patrol_team_occupy_range = 302;
	int32 patrol_team_occupy_milliseconds = 303;
	float patrol_team_view_range = 304;
	float patrol_team_flashlight_width = 305;
	float patrol_team_flashlight_length = 306;
	float patrol_team_vignette_size = 307;
	bool patrol_team_end_game_rescue_element_enabled = 308;
	int32 stage_releasable_facility_count = 400;
	int32 stage_release_required_facility_count = 401;
	int32 stage_facility_release_required_key_count = 402;
	int32 stage_facility_release_milliseconds = 403;
	int32 stage_facility_release_time_permil_down = 404;
	int32 stage_key_reappear_milliseconds = 406;
	int32 stage_laser_gimmick_release_key_count = 407;
	int32 stage_laser_gimmick_release_milliseconds = 408;
	bool stage_laser_gimmick_reappear_enabled = 409;
