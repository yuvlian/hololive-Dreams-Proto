	float stage_camera_height = 411;
	float stage_camera_angle = 412;
	string scene_asset_id = 500;
	string key_gathering_asset_id = 501;
	string key_taking_asset_id = 502;
	string mischief_motion_controller_type000_asset_id = 503;
	string mischief_motion_controller_type001_asset_id = 504;
	string mischief_motion_controller_type002_asset_id = 505;
	string patrol_motion_controller_asset_id = 506;
	string character_motion_config_asset_id = 507;
	string laser_gimmick_asset_id = 508;
	string material_asset_id = 509;
	string foot_effect_asset_id = 510;
	string flash_light_asset_id = 511;
	string team_select_background_asset_id = 512;
	string mini_map_asset_id = 513;
	string overall_map_asset_id = 514;
	string effect_config_asset_id = 515;
}
