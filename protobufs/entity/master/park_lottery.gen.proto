syntax = "proto3";

import "common/consumption.gen.proto";
import "entity/master/options/master.proto";
import "enums/park_lottery_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message ParkLottery {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	.enums.ParkLotteryType type = 2;
	int32 daily_limit_count = 3 [(options.master.optional) = true];
	string limit_reached_park_talk_group_id = 4 [(options.master.fk) = "ParkTalk:group_id", (options.master.optional) = true];
	string condition_group_id = 8 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	.common.Consumption consumption = 1000 [(options.master.optional) = true];
}
