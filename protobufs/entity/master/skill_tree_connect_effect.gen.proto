syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/skill_tree_connect_effect_type.gen.proto";
import "enums/skill_tree_node_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message SkillTreeConnectEffect {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	int32 level = 2 [(options.master.pk) = true];
	.enums.SkillTreeConnectEffectType connect_effect_type = 3;
	string skill_tree_connect_effect_extent_group_id = 4 [(options.master.fk) = "SkillTreeConnectEffectExtent:group_id"];
	int64 effect_permil_up = 5 [(options.master.optional) = true];
	string additional_skill_tree_effect_id = 6 [(options.master.fk) = "SkillTreeEffect:id", (options.master.optional) = true];
	string target_skill_tree_effect_id = 7 [(options.master.fk) = "SkillTreeEffect:id", (options.master.optional) = true];
	.enums.SkillTreeNodeType target_node_type = 8 [(options.master.optional) = true];
	int32 target_node_grade = 9 [(options.master.optional) = true];
	string description_lang_id = 1000 [(options.master.fk) = "LangGeneratedSkillTreeConnectEffect:id"];
}
