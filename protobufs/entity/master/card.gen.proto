syntax = "proto3";

import "common/reward.gen.proto";
import "entity/master/options/master.proto";
import "enums/card_asset_type.gen.proto";
import "enums/card_attribute_type.gen.proto";
import "enums/card_horizontal_anchor_type.gen.proto";
import "enums/card_rarity.gen.proto";
import "enums/card_vertical_anchor_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message Card {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	string character_id = 2 [(options.master.fk) = "Character:id"];
	string name_lang_id = 3 [(options.master.fk) = "LangCard:id"];
	.enums.CardRarity rarity = 4;
	.enums.CardAttributeType attribute_type = 5;
	string card_level_group_id = 6 [(options.master.fk) = "CardLevel:group_id"];
	int32 performance_permil_multiply = 7;
	int32 technique_permil_multiply = 8;
	int32 sense_permil_multiply = 9;
	string card_level_limit_group_id = 10 [(options.master.fk) = "CardLevelLimit:group_id"];
	string live_passive_skill_id = 11 [(options.master.fk) = "LivePassiveSkill:id"];
	string live_active_skill_id = 12 [(options.master.fk) = "LiveActiveSkill:id"];
	string live_special_skill_id = 13 [(options.master.fk) = "LiveSpecialSkill:id"];
	string card_potential_group_id = 14 [(options.master.fk) = "CardPotential:group_id"];
	string asset_id = 18 [(options.master.optional) = true];
	string background_asset_id = 19 [(options.master.optional) = true];
	string live_skill_character_voice_id = 21 [(options.master.fk) = "CharacterVoice:id", (options.master.optional) = true];
	string skill_tree_connect_effect_id = 22 [(options.master.fk) = "SkillTreeConnectEffect:id", (options.master.optional) = true];
	string reward_costume_id = 23 [(options.master.fk) = "Costume:id", (options.master.optional) = true];
	string reward_sd_costume_id = 24 [(options.master.fk) = "SdCostume:id", (options.master.optional) = true];
	.enums.CardAssetType asset_type = 25;
	.enums.CardVerticalAnchorType vertical_anchor_type = 26;
	.enums.CardHorizontalAnchorType horizontal_anchor_type = 27;
	string gacha_animation_character_voice_id = 28 [(options.master.fk) = "CharacterVoice:id", (options.master.optional) = true];
	string card_detail_character_voice_id = 29 [(options.master.fk) = "CharacterVoice:id", (options.master.optional) = true];
	bool is_no_signed_card_message = 33 [(options.master.optional) = true];
	string potential_upgrade1_character_voice_id = 34 [(options.master.fk) = "CharacterVoice:id", (options.master.optional) = true];
	string potential_upgrade2_character_voice_id = 35 [(options.master.fk) = "CharacterVoice:id", (options.master.optional) = true];
	string potential_upgrade3_character_voice_id = 36 [(options.master.fk) = "CharacterVoice:id", (options.master.optional) = true];
	string potential_upgrade4_character_voice_id = 37 [(options.master.fk) = "CharacterVoice:id", (options.master.optional) = true];
	string potential_upgrade5_character_voice_id = 38 [(options.master.fk) = "CharacterVoice:id", (options.master.optional) = true];
	int32 order = 999;
	.common.Reward potential_alternative_reward = 1000 [(options.master.optional) = true];
	.common.Reward acquire_reward = 1001 [(options.master.optional) = true];
}
