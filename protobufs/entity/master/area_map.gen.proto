syntax = "proto3";

import "entity/master/options/master.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message AreaMap {
	option (options.master.table) = true;

	string area_appearance_area_id = 1 [(options.master.pk) = true, (options.master.fk) = "AreaAppearance:area_id", (options.master.optional) = true];
	int32 area_appearance_priority = 2 [(options.master.pk) = true];
	int32 priority = 3 [(options.master.pk) = true];
	string map_asset_id = 4 [(options.master.optional) = true];
	string mini_map_asset_id = 5 [(options.master.optional) = true];
	string condition_group_id = 6 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
}
