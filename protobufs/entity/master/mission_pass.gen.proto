syntax = "proto3";

import "entity/master/options/master.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message MissionPass {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	string view_condition_group_id = 2 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	string unlock_condition_group_id = 3 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	int64 progress_start_time = 4 [(options.master.optional) = true];
	int64 start_time = 5 [(options.master.optional) = true];
	int64 end_time = 6 [(options.master.optional) = true];
	string mission_pass_level_group_id = 7 [(options.master.fk) = "MissionPassLevel:group_id"];
	string mission_pass_point_id = 8 [(options.master.fk) = "MissionPassPoint:id"];
	int32 level_up_required_point_quantity = 9;
	string season_mission_group_id = 10 [(options.master.fk) = "MissionGroup:id"];
	string daily_mission_group_id = 11 [(options.master.fk) = "MissionGroup:id"];
	string weekly_mission_group_id = 12 [(options.master.fk) = "MissionGroup:id"];
	int32 daily_mission_pass_point_receive_limit_quantity = 13 [(options.master.optional) = true];
	int32 weekly_mission_pass_point_receive_limit_quantity = 14 [(options.master.optional) = true];
	repeated string premium_promotion_sd_costume_hair_accessory_ids = 15 [(options.master.fk) = "SdCostumeHairAccessory:id"];
	repeated string premium_promotion_sd_costume_ids = 16 [(options.master.fk) = "SdCostume:id"];
	repeated string premium_promotion_motion_asset_ids = 17;
}
