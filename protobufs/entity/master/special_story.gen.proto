syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/story_asset_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message SpecialStory {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	string title_lang_id = 2 [(options.master.fk) = "LangSpecialStory:id"];
	string story_id = 3 [(options.master.fk) = "Story:id"];
	string archive_view_condition_group_id = 4 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	string unlock_condition_group_id = 5 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	string asset_id = 6;
	.enums.StoryAssetType asset_type = 7;
	int32 order = 999;
}
