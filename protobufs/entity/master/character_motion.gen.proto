syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/character_motion_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message CharacterMotion {
	option (options.master.table) = true;

	string character_id = 1 [(options.master.pk) = true, (options.master.fk) = "Character:id"];
	.enums.CharacterMotionType type = 2 [(options.master.pk) = true];
	string motion_asset_id = 3;
	string expression_asset_id = 4 [(options.master.optional) = true];
}
