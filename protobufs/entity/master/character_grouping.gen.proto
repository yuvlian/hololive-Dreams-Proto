syntax = "proto3";

import "entity/master/options/master.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message CharacterGrouping {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	string name_lang_id = 2 [(options.master.fk) = "LangCharacterGrouping:id"];
	string description_lang_id = 3 [(options.master.fk) = "LangCharacterGrouping:id"];
	bool is_regular = 4 [(options.master.optional) = true];
	repeated string character_ids = 5 [(options.master.fk) = "Character:id"];
	string asset_id = 6;
	string color1 = 100;
	string color2 = 101;
	int32 order = 999;
}
