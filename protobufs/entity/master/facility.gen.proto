syntax = "proto3";

import "entity/master/options/master.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message Facility {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	string name_lang_id = 2 [(options.master.fk) = "LangFacility:id"];
	string description_lang_id = 3 [(options.master.fk) = "LangFacility:id", (options.master.optional) = true];
	string area_id = 4 [(options.master.fk) = "Area:id", (options.master.optional) = true];
	int32 order = 999;
}
