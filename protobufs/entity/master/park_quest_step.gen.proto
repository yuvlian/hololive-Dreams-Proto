syntax = "proto3";

import "common/reward.gen.proto";
import "entity/master/options/master.proto";
import "enums/park_quest_step_transition_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message ParkQuestStep {
	option (options.master.table) = true;

	string park_quest_id = 1 [(options.master.pk) = true, (options.master.fk) = "ParkQuest:id"];
	int32 step_group_number = 2 [(options.master.pk) = true];
	int32 step = 3 [(options.master.pk) = true];
	string target_lang_id = 4 [(options.master.fk) = "LangParkQuestStep:id", (options.master.optional) = true];
	string description_lang_id = 5 [(options.master.fk) = "LangParkQuestStep:id"];
	string unlock_condition_group_id = 6 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
	.enums.ParkQuestStepTransitionType transition_type = 7 [(options.master.optional) = true];
	string transition_adv_asset_id = 8 [(options.master.optional) = true];
	string after_adv_area_id = 9 [(options.master.fk) = "Area:id", (options.master.optional) = true];
	int32 after_adv_area_player_spawn_point_index = 10 [(options.master.optional) = true];
	string after_adv_facility_id = 11 [(options.master.fk) = "Facility:id", (options.master.optional) = true];
	string asset_id = 15;
	repeated .common.Reward rewards = 1000 [(options.master.optional) = true];
}
