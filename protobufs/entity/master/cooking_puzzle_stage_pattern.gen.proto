syntax = "proto3";

import "entity/master/options/master.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message CookingPuzzleStagePattern {
	option (options.master.table) = true;

	string group_id = 1 [(options.master.pk) = true];
	int32 number = 2 [(options.master.pk) = true];
	string cooking_puzzle_recipe_id = 3 [(options.master.fk) = "CookingPuzzleRecipe:id"];
	repeated string dummy_cooking_puzzle_foodstuff_ids = 4 [(options.master.fk) = "CookingPuzzleFoodstuff:id", (options.master.optional) = true];
	repeated int32 dummy_cooking_puzzle_foodstuff_quantities = 5 [(options.master.optional) = true];
}
