syntax = "proto3";

import "entity/master/options/master.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message MusicMvCategory {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	string label_name_lang_id = 2 [(options.master.fk) = "LangMusicMvCategory:id"];
	bool is_default_for_compatible_device = 3 [(options.master.optional) = true];
	bool is_default_for_incompatible_device = 4 [(options.master.optional) = true];
	bool is_display_filter = 5 [(options.master.optional) = true];
	string filter_name_lang_id = 6 [(options.master.fk) = "LangMusicMvCategory:id", (options.master.optional) = true];
	int32 order = 999;
}
