syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/game_screen_type.gen.proto";
import "enums/tips_hint_type.gen.proto";
import "enums/tips_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message Tips {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	.enums.TipsType type = 2;
	string title_lang_id = 3 [(options.master.fk) = "LangTips:id"];
	.enums.GameScreenType game_screen_type = 4 [(options.master.optional) = true];
	.enums.TipsHintType hint_type = 5 [(options.master.optional) = true];
	int32 order = 999;
}
