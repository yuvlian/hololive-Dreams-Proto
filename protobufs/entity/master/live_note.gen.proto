syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/live_note_judgement_type.gen.proto";
import "enums/live_note_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message LiveNote {
	option (options.master.table) = true;

	.enums.LiveNoteType note_type = 1 [(options.master.pk) = true];
	.enums.LiveNoteJudgementType judgement_type = 2 [(options.master.pk) = true];
	float acceptable_before_frame_count = 3 [(options.master.optional) = true];
	float acceptable_after_frame_count = 4 [(options.master.optional) = true];
	int32 score_coefficient_permil_multiply = 5 [(options.master.optional) = true];
	int32 pc_score_coefficient_permil_multiply = 6 [(options.master.optional) = true];
	int32 life_reduction_quantity = 7 [(options.master.optional) = true];
	int32 fever_point = 8 [(options.master.optional) = true];
	int32 music_creative_chart_difficulty_weight_permil = 100 [(options.master.optional) = true];
}
