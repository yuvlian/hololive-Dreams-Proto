syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/live_evaluation_rank_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message LiveScoreEvaluationRank {
	option (options.master.table) = true;

	string group_id = 1 [(options.master.pk) = true];
	.enums.LiveEvaluationRankType evaluation_rank_type = 2 [(options.master.pk) = true];
	int32 plus = 3 [(options.master.pk) = true, (options.master.optional) = true];
	int64 score = 4 [(options.master.optional) = true];
}
