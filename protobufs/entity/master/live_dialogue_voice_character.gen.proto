syntax = "proto3";

import "entity/master/options/master.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message LiveDialogueVoiceCharacter {
	option (options.master.table) = true;

	string character_id = 1 [(options.master.pk) = true, (options.master.fk) = "Character:id", (options.master.optional) = true];
	string live_dialogue_voice_id = 2 [(options.master.pk) = true, (options.master.fk) = "LiveDialogueVoice:id", (options.master.optional) = true];
	int32 order = 999 [(options.master.optional) = true];
}
