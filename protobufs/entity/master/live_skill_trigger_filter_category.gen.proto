syntax = "proto3";

import "entity/master/options/master.proto";
import "enums/live_skill_trigger_type.gen.proto";

package entity.master;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/master";
option csharp_namespace = "Vision.Common.Proto.Master";

message LiveSkillTriggerFilterCategory {
	option (options.master.table) = true;

	string id = 1 [(options.master.pk) = true];
	string name_lang_id = 2 [(options.master.fk) = "LangLiveSkillTriggerFilterCategory:id"];
	repeated .enums.LiveSkillTriggerType live_skill_trigger_types = 3;
	int32 order = 999;
}
