syntax = "proto3";

import "buf/validate/validate.proto";
import "dto/multi_game_result/common.gen.proto";
import "enums/cheat_severity_type.gen.proto";
import "enums/circuit_area_type.gen.proto";
import "options/multi_game_result.proto";

package dto.multi_game_result;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/dto/multi_game_result";
option csharp_namespace = "Vision.Common.Proto.Dto.MultiGameResult";

message MiniGameCircuitResult {
	option (options.multi_game_result.message).multi_game_type = MULTI_GAME_TYPE_MINI_GAME_CIRCUIT;

	message RankResult {
		int32 rank = 1 [(buf.validate.field).int32.gte = 1];
		int64 clear_time_milliseconds = 2 [(buf.validate.field).int64.gte = 0];
		repeated MiniGameCircuitResult.AreaInfo area_infos = 3;
		repeated int64 area_pass_milliseconds = 50;
		repeated int32 dash_counts = 51;
		.enums.CheatSeverityType cheat_severity_type = 52;
		MultiGameCommonUserResult common_user_result = 100 [(buf.validate.field).required = true];
	}

	message AreaInfo {
		.enums.CircuitAreaType area_type = 1;
		int32 fall_count = 2 [(buf.validate.field).int32.gte = 0];
		int32 crash_count = 3 [(buf.validate.field).int32.gte = 0];
		int32 damage_count = 4 [(buf.validate.field).int32.gte = 0];
	}

	repeated MiniGameCircuitResult.RankResult rank_results = 1 [(buf.validate.field).repeated.min_items = 1];
}
