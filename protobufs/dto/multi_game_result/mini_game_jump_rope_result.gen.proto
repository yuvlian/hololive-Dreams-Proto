syntax = "proto3";

import "buf/validate/validate.proto";
import "dto/multi_game_result/common.gen.proto";
import "options/multi_game_result.proto";

package dto.multi_game_result;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/dto/multi_game_result";
option csharp_namespace = "Vision.Common.Proto.Dto.MultiGameResult";

message MiniGameJumpRopeResult {
	option (options.multi_game_result.message).multi_game_type = MULTI_GAME_TYPE_MINI_GAME_JUMP_ROPE;

	message UserResult {
		int32 continuous_jump_count = 1 [(buf.validate.field).int32.gte = 0];
		int32 success_jump_count = 2 [(buf.validate.field).int32.gte = 0];
		int32 failure_jump_count = 3 [(buf.validate.field).int32.gte = 0];
		int64 gimmick_random_seed = 50;
		MultiGameCommonUserResult common_user_result = 100 [(buf.validate.field).required = true];
	}

	int32 total_jump_count = 1 [(buf.validate.field).int32.gte = 0];
	repeated MiniGameJumpRopeResult.UserResult user_results = 2 [(buf.validate.field).repeated.min_items = 1];
}
