syntax = "proto3";

import "buf/validate/validate.proto";
import "entity/master/options/master.proto";

package dto.multi_game_result;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/dto/multi_game_result";
option csharp_namespace = "Vision.Common.Proto.Dto.MultiGameResult";

message MultiGameCommonUserResult {
	message NpcInfo {
		string mini_game_npc_id = 1 [(buf.validate.field).string.min_bytes = 1, (options.master.fk) = "MiniGameNpc:id"];
		string name_suffix = 2;
	}

	string public_user_id = 1;
	MultiGameCommonUserResult.NpcInfo npc_info = 2;
	string character_id = 3 [(buf.validate.field).string.min_bytes = 1, (options.master.fk) = "Character:id"];
	string sd_costume_id = 4 [(options.master.fk) = "SdCostume:id"];
	string sd_costume_hair_accessory_id = 5 [(options.master.fk) = "SdCostumeHairAccessory:id"];
	bool is_disconnected = 6;
}
