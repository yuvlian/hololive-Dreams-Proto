syntax = "proto3";

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "options/check_option.proto";
import "rpc/api/common/response.gen.proto";

package rpc.api;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/rpc/api";
option csharp_namespace = "Vision.Common.Proto.Api";

message StartupNotificationReadRequest {
	repeated string startup_notification_ids = 1 [(buf.validate.field).repeated.min_items = 1, (buf.validate.field).repeated.unique = true, (buf.validate.field).repeated.items.string.min_bytes = 1];
}

message StartupNotificationReadMusicRequest {
	repeated string music_startup_notification_ids = 1 [(buf.validate.field).repeated.min_items = 1, (buf.validate.field).repeated.unique = true, (buf.validate.field).repeated.items.string.min_bytes = 1];
}

message StartupNotificationReadResponse {
	common.Response common_response = 9999;
}

message StartupNotificationReadMusicResponse {
	common.Response common_response = 9999;
}

service StartupNotification {
	rpc Read (.rpc.api.StartupNotificationReadRequest) returns (.rpc.api.StartupNotificationReadResponse) {
		option (google.api.http).post = "/StartupNotification/Read";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ReadMusic (.rpc.api.StartupNotificationReadMusicRequest) returns (.rpc.api.StartupNotificationReadMusicResponse) {
		option (google.api.http).post = "/StartupNotification/ReadMusic";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}
}
