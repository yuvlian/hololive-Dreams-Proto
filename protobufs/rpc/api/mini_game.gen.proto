syntax = "proto3";

import "buf/validate/validate.proto";
import "common/consumption.gen.proto";
import "enums/mini_game_type.gen.proto";
import "google/api/annotations.proto";
import "options/check_option.proto";
import "rpc/api/common/response.gen.proto";
import "rpc/api/common/reward.gen.proto";

package rpc.api;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/rpc/api";
option csharp_namespace = "Vision.Common.Proto.Api";

message MiniGameRecoverRewardUpStaminaRequest {
	repeated .common.Consumption consumptions = 1 [(buf.validate.field).repeated.min_items = 1];
}

message MiniGameConvertRewardUpStaminaToRewardRequest {
	string mini_game_reward_up_stamina_conversion_id = 1 [(buf.validate.field).string.min_bytes = 1];
	int32 conversion_count = 2 [(buf.validate.field).int32.gte = 1];
}

message MiniGameConvertRewardUpStaminaToRewardResponse {
	repeated common.RewardResult reward_results = 1;
	common.Response common_response = 9999;
}

message MiniGameReadNotificationRequest {
	repeated .enums.MiniGameType read_mini_game_types = 1 [(buf.validate.field).repeated.min_items = 1, (buf.validate.field).repeated.items.enum.defined_only = true, (buf.validate.field).repeated.items.enum.not_in = 0];
}

message MiniGameSetConsumptionSettingRequest {
	.enums.MiniGameType mini_game_type = 1 [(buf.validate.field).enum.defined_only = true, (buf.validate.field).enum.not_in = 0];
	int64 quantity = 2 [(buf.validate.field).int64.gte = 0];
}

message MiniGameRecoverRewardUpStaminaResponse {
	common.Response common_response = 9999;
}

message MiniGameReadNotificationResponse {
	common.Response common_response = 9999;
}

message MiniGameSetConsumptionSettingResponse {
	common.Response common_response = 9999;
}

service MiniGame {
	rpc RecoverRewardUpStamina (.rpc.api.MiniGameRecoverRewardUpStaminaRequest) returns (.rpc.api.MiniGameRecoverRewardUpStaminaResponse) {
		option (google.api.http).post = "/MiniGame/RecoverRewardUpStamina";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ConvertRewardUpStaminaToReward (.rpc.api.MiniGameConvertRewardUpStaminaToRewardRequest) returns (.rpc.api.MiniGameConvertRewardUpStaminaToRewardResponse) {
		option (google.api.http).post = "/MiniGame/ConvertRewardUpStaminaToReward";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ReadNotification (.rpc.api.MiniGameReadNotificationRequest) returns (.rpc.api.MiniGameReadNotificationResponse) {
		option (google.api.http).post = "/MiniGame/ReadNotification";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc SetConsumptionSetting (.rpc.api.MiniGameSetConsumptionSettingRequest) returns (.rpc.api.MiniGameSetConsumptionSettingResponse) {
		option (google.api.http).post = "/MiniGame/SetConsumptionSetting";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}
}
