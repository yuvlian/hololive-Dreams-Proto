syntax = "proto3";

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "options/check_option.proto";
import "options/zap.proto";

package rpc.api;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/rpc/api";
option csharp_namespace = "Vision.Common.Proto.Api";

message AuthCreateResponse {
	string credential = 1 [(options.zap.hidden) = true];
}

message AuthLoginRequest {
	string credential = 1 [(options.zap.hidden) = true, (buf.validate.field).string.min_bytes = 1];
}

message AuthLoginResponse {
	string game_auth_token = 1 [(options.zap.hidden) = true];
	bool is_play_integrity_check_required = 2;
	string play_integrity_nonce = 3 [(options.zap.hidden) = true];
}

service Auth {
	rpc Create (.google.protobuf.Empty) returns (.rpc.api.AuthCreateResponse) {
		option (google.api.http).post = "/Auth/Create";
		option (google.api.http).body = "*";
		option (options.check_option.check).disabled_game_auth_token = true;
		option (options.check_option.check).disabled_master_version = true;
	}

	rpc Login (.rpc.api.AuthLoginRequest) returns (.rpc.api.AuthLoginResponse) {
		option (google.api.http).post = "/Auth/Login";
		option (google.api.http).body = "*";
		option (options.check_option.check).disabled_game_auth_token = true;
		option (options.check_option.check).disabled_master_version = true;
	}
}
