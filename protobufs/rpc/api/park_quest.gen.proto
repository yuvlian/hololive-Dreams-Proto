service ParkQuest {
	rpc StartCharacter (.rpc.api.ParkQuestStartCharacterRequest) returns (.rpc.api.ParkQuestStartCharacterResponse) {
		option (google.api.http).post = "/ParkQuest/StartCharacter";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ClearStep (.rpc.api.ParkQuestClearStepRequest) returns (.rpc.api.ParkQuestClearStepResponse) {
		option (google.api.http).post = "/ParkQuest/ClearStep";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc GetLiveFixedDeck (.rpc.api.ParkQuestGetLiveFixedDeckRequest) returns (.rpc.api.ParkQuestGetLiveFixedDeckResponse) {
		option (google.api.http).post = "/ParkQuest/GetLiveFixedDeck";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc GetLiveFixedCharacterDeck (.rpc.api.ParkQuestGetLiveFixedCharacterDeckRequest) returns (.rpc.api.ParkQuestGetLiveFixedCharacterDeckResponse) {
		option (google.api.http).post = "/ParkQuest/GetLiveFixedCharacterDeck";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc StartLive (.rpc.api.ParkQuestStartLiveRequest) returns (.rpc.api.ParkQuestStartLiveResponse) {
		option (google.api.http).post = "/ParkQuest/StartLive";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc FinishLive (.rpc.api.ParkQuestFinishLiveRequest) returns (.rpc.api.ParkQuestFinishLiveResponse) {
		option (google.api.http).post = "/ParkQuest/FinishLive";
		option (google.api.http).body = "*";
		option (options.check_option.check).disabled_master_version = true;
		option (options.check_option.check).enabled_response_cache = true;
		option (options.check_option.check).enabled_request_signature = true;
	}

	rpc RetryLive (.rpc.api.ParkQuestRetryLiveRequest) returns (.rpc.api.ParkQuestRetryLiveResponse) {
		option (google.api.http).post = "/ParkQuest/RetryLive";
		option (google.api.http).body = "*";
		option (options.check_option.check).disabled_master_version = true;
		option (options.check_option.check).enabled_response_cache = true;
		option (options.check_option.check).enabled_request_signature = true;
	}

	rpc RetireLive (.rpc.api.ParkQuestRetireLiveRequest) returns (.rpc.api.ParkQuestRetireLiveResponse) {
