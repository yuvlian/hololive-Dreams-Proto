syntax = "proto3";

import "buf/validate/validate.proto";
import "enums/character_history_type.gen.proto";
import "google/api/annotations.proto";
import "options/check_option.proto";
import "rpc/api/common/response.gen.proto";

package rpc.api;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/rpc/api";
option csharp_namespace = "Vision.Common.Proto.Api";

message CharacterHistoryListRequest {
	string character_id = 1 [(buf.validate.field).string.min_bytes = 1];
	int32 offset = 2 [(buf.validate.field).int32.gte = 0];
}

message CharacterHistoryListResponse {
	message History {
		.enums.CharacterHistoryType character_history_type = 1;
		int32 order = 2;
		int64 occurred_time = 3;
		string target_id = 4;
		int64 threshold = 5;
	}

	repeated CharacterHistoryListResponse.History histories = 1;
	bool is_next = 2;
	common.Response common_response = 9999;
}

service CharacterHistory {
	rpc List (.rpc.api.CharacterHistoryListRequest) returns (.rpc.api.CharacterHistoryListResponse) {
		option (google.api.http).post = "/CharacterHistory/List";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}
}
