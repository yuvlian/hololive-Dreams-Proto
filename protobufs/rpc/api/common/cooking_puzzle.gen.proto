syntax = "proto3";

import "buf/validate/validate.proto";
import "entity/master/options/master.proto";

package rpc.api.common;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/rpc/common_api";
option csharp_namespace = "Vision.Common.Proto.Api.Common";

message CookingPuzzleRecipeInfo {
	string cooking_puzzle_recipe_id = 1 [(buf.validate.field).string.min_bytes = 1, (options.master.fk) = "CookingPuzzleRecipe:id"];
	int64 elapsed_time_millisecond = 2 [(buf.validate.field).int64.gte = 0];
	int64 score = 3 [(buf.validate.field).int64.gte = 0];
	int32 stage_number = 4 [(buf.validate.field).int32.gte = 1];
}
