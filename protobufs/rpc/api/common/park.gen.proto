syntax = "proto3";

import "buf/validate/validate.proto";
import "entity/master/options/master.proto";

package rpc.api.common;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/rpc/common_api";
option csharp_namespace = "Vision.Common.Proto.Api.Common";

message ParkQuestCommonRequestParam {
	string park_quest_id = 1 [(buf.validate.field).string.min_bytes = 1, (options.master.fk) = "ParkQuest:id"];
	int32 step_group_number = 2 [(buf.validate.field).int32.gte = 1];
	int32 step = 3 [(buf.validate.field).int32.gte = 1];
	string park_target_mapping_id = 4 [(buf.validate.field).string.min_bytes = 1, (options.master.fk) = "ParkTargetMapping:id"];
	int32 action_number = 5 [(buf.validate.field).int32.gte = 1];
}

message ParkPermanenceCommonRequestParam {
	string park_permanence_id = 1 [(buf.validate.field).string.min_bytes = 1, (options.master.fk) = "ParkPermanence:id"];
	int32 action_number = 2 [(buf.validate.field).int32.gte = 1];
}
