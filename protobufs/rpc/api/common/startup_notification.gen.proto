syntax = "proto3";

import "enums/startup_notification_type.gen.proto";
import "enums/transition_type.gen.proto";

package rpc.api.common;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/rpc/common_api";
option csharp_namespace = "Vision.Common.Proto.Api.Common";

message StartupNotification {
	string id = 1;
	.enums.StartupNotificationType type = 2;
	int32 priority = 3;
	string asset_id = 4;
	.enums.TransitionType content_startup_notification_transition_type = 100;
	string content_startup_notification_transition_id = 101;
}
