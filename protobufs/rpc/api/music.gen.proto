syntax = "proto3";

import "buf/validate/validate.proto";
import "entity/master/options/master.proto";
import "enums/music_difficulty_type.gen.proto";
import "google/api/annotations.proto";
import "options/check_option.proto";
import "options/zap.proto";
import "rpc/api/common/ranking.gen.proto";
import "rpc/api/common/response.gen.proto";

package rpc.api;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/rpc/api";
option csharp_namespace = "Vision.Common.Proto.Api";

message MusicSwitchFavoriteRequest {
	string music_id = 1 [(buf.validate.field).string.min_bytes = 1];
	bool is_favorite = 2;
}

message MusicGetHighestScoreLiveDeckRequest {
	string public_user_id = 1 [(buf.validate.field).string.min_bytes = 1];
	string music_id = 2 [(buf.validate.field).string.min_bytes = 1];
}

message MusicGetHighestScoreLiveDeckResponse {
	common.RankingLiveDeckInfo ranking_live_deck_info = 1;
	common.Response common_response = 9999;
}

message MusicGetHighestScoreRankingInfoRequest {
	string music_id = 1 [(buf.validate.field).string.min_bytes = 1];
}

message MusicGetHighestScoreRankingInfoResponse {
	message MusicDifficultyScoreInfo {
		.enums.MusicDifficultyType music_difficulty_type = 1;
		int64 score = 2;
	}

	int32 self_rank = 1;
	repeated common.BasicRankingRankInfo rank_infos = 2 [(options.zap.hidden) = true];
	repeated MusicGetHighestScoreRankingInfoResponse.MusicDifficultyScoreInfo self_music_difficulty_score_infos = 3;
	common.Response common_response = 9999;
}

message MusicListHighestScoreRatingRankingRankRequest {
	repeated string character_ids = 1 [(buf.validate.field).repeated.min_items = 1, (buf.validate.field).repeated.unique = true, (buf.validate.field).repeated.items.string.min_bytes = 1];
}

message MusicListHighestScoreRatingRankingRankResponse {
	message RankInfo {
		string character_id = 2 [(options.master.fk) = "Character:id"];
		int32 rank = 1;
	}

	repeated MusicListHighestScoreRatingRankingRankResponse.RankInfo rank_infos = 1 [(options.zap.hidden) = true];
	common.Response common_response = 9999;
}

message MusicGetHighestScoreRatingRankingInfoRequest {
	string character_id = 1 [(buf.validate.field).string.min_bytes = 1];
}

message MusicGetHighestScoreRatingRankingInfoResponse {
	repeated common.BasicRankingRankInfo rank_infos = 1 [(options.zap.hidden) = true];
	common.Response common_response = 9999;
}

message MusicReleaseMusicRequest {
	string music_id = 1 [(buf.validate.field).string.min_bytes = 1];
}

message MusicListHighestScoreRatingRankingRewardThresholdRankingRankInfoRequest {
	string character_id = 1 [(buf.validate.field).string.min_bytes = 1];
}

message MusicListHighestScoreRatingRankingRewardThresholdRankingRankInfoResponse {
	message ThresholdRankingRankInfo {
		int32 rank = 1;
		int64 score = 2;
	}

	repeated MusicListHighestScoreRatingRankingRewardThresholdRankingRankInfoResponse.ThresholdRankingRankInfo threshold_rank_infos = 1;
	int64 updated_ranking_time = 2;
	common.Response common_response = 9999;
}

message MusicSwitchFavoriteResponse {
	common.Response common_response = 9999;
}

message MusicReleaseMusicResponse {
	common.Response common_response = 9999;
}

service Music {
	rpc SwitchFavorite (.rpc.api.MusicSwitchFavoriteRequest) returns (.rpc.api.MusicSwitchFavoriteResponse) {
		option (google.api.http).post = "/Music/SwitchFavorite";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc GetHighestScoreLiveDeck (.rpc.api.MusicGetHighestScoreLiveDeckRequest) returns (.rpc.api.MusicGetHighestScoreLiveDeckResponse) {
		option (google.api.http).post = "/Music/GetHighestScoreLiveDeck";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc GetHighestScoreRankingInfo (.rpc.api.MusicGetHighestScoreRankingInfoRequest) returns (.rpc.api.MusicGetHighestScoreRankingInfoResponse) {
		option (google.api.http).post = "/Music/GetHighestScoreRankingInfo";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ListHighestScoreRatingRankingRank (.rpc.api.MusicListHighestScoreRatingRankingRankRequest) returns (.rpc.api.MusicListHighestScoreRatingRankingRankResponse) {
		option (google.api.http).post = "/Music/ListHighestScoreRatingRankingRank";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc GetHighestScoreRatingRankingInfo (.rpc.api.MusicGetHighestScoreRatingRankingInfoRequest) returns (.rpc.api.MusicGetHighestScoreRatingRankingInfoResponse) {
		option (google.api.http).post = "/Music/GetHighestScoreRatingRankingInfo";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ReleaseMusic (.rpc.api.MusicReleaseMusicRequest) returns (.rpc.api.MusicReleaseMusicResponse) {
		option (google.api.http).post = "/Music/ReleaseMusic";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ListHighestScoreRatingRankingRewardThresholdRankingRankInfo (.rpc.api.MusicListHighestScoreRatingRankingRewardThresholdRankingRankInfoRequest) returns (.rpc.api.MusicListHighestScoreRatingRankingRewardThresholdRankingRankInfoResponse) {
		option (google.api.http).post = "/Music/ListHighestScoreRatingRankingRewardThresholdRankingRankInfo";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}
}
