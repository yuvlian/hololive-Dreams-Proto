syntax = "proto3";

import "buf/validate/validate.proto";
import "enums/notification_read_type.gen.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "options/check_option.proto";
import "rpc/api/common/response.gen.proto";

package rpc.api;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/rpc/api";
option csharp_namespace = "Vision.Common.Proto.Api";

message NotificationReadRequest {
	.enums.NotificationReadType type = 1 [(buf.validate.field).enum.defined_only = true, (buf.validate.field).enum.not_in = 0];
}

message NotificationListResponse {
	message ParkNotificationInfo {
		message ExchangeBoothGroup {
			string group_id = 1;
			string name = 2;
		}

		repeated NotificationListResponse.ParkNotificationInfo.ExchangeBoothGroup updated_exchange_booth_groups = 1;
	}

	bool is_gacha_unread = 1;
	bool is_notice_unread = 2;
	bool is_friend_offer_received = 3;
	bool is_friend_exists = 4;
	bool is_membership_unread = 5;
	bool is_shop_item_unread = 6;
	NotificationListResponse.ParkNotificationInfo park_notification_info = 100;
	common.Response common_response = 9999;
}

message NotificationReadResponse {
	common.Response common_response = 9999;
}

service Notification {
	rpc Read (.rpc.api.NotificationReadRequest) returns (.rpc.api.NotificationReadResponse) {
		option (google.api.http).post = "/Notification/Read";
		option (google.api.http).body = "*";
		option (options.check_option.check).disabled_master_version = true;
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc List (.google.protobuf.Empty) returns (.rpc.api.NotificationListResponse) {
		option (google.api.http).post = "/Notification/List";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}
}
