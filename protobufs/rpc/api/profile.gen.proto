syntax = "proto3";

import "buf/validate/validate.proto";
import "common/emblem_position.gen.proto";
import "enums/complain_category_type.gen.proto";
import "enums/profile_publish_type.gen.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "options/check_option.proto";
import "options/zap.proto";
import "rpc/api/common/profile.gen.proto";
import "rpc/api/common/response.gen.proto";
import "rpc/api/common/storage_url.gen.proto";

package rpc.api;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/rpc/api";
option csharp_namespace = "Vision.Common.Proto.Api";

message ProfileSetNameRequest {
	string name = 1 [(buf.validate.field).string.min_bytes = 1];
}

message ProfileSetMessageRequest {
	string message = 1 [(buf.validate.field).string.min_bytes = 1];
}

message ProfileSetFanMarkRequest {
	string fan_mark_id = 1;
}

message ProfileSwitchPublishSettingRequest {
	.enums.ProfilePublishType profile_publish_type = 1 [(buf.validate.field).enum.defined_only = true, (buf.validate.field).enum.not_in = 0];
	bool is_publish = 2;
}

message ProfileSetEmblemRequest {
	repeated .common.EmblemPosition emblem_positions = 1 [(buf.validate.field).repeated.max_items = 5];
}

message ProfileGetUserProfileDetailRequest {
	string public_user_id = 1 [(buf.validate.field).string.min_bytes = 1];
}

message ProfileGetUserProfileDetailResponse {
	common.UserProfileDetailInfo user_profile_detail_info = 1;
	common.Response common_response = 9999;
}

message ProfileBlockUserRequest {
	string public_user_id = 1 [(buf.validate.field).string.min_bytes = 1];
}

message ProfileUnblockUserRequest {
	string public_user_id = 1 [(buf.validate.field).string.min_bytes = 1];
}

message ProfileListBlockedUserResponse {
	repeated common.BasicUserInfo user_infos = 1;
	common.Response common_response = 9999;
}

message ProfileComplainUserRequest {
	string public_user_id = 1 [(buf.validate.field).string.min_bytes = 1];
	repeated .enums.ComplainCategoryType category_types = 2 [(buf.validate.field).repeated.unique = true, (buf.validate.field).repeated.items.enum.defined_only = true, (buf.validate.field).repeated.items.enum.not_in = 0];
	string message = 3 [(buf.validate.field).string.min_bytes = 1];
}

message ProfileListCustomPaletteResponse {
	repeated common.CustomPalette custom_palettes = 1;
	common.Response common_response = 9999;
}

message ProfileGetCustomPaletteImageUploadUrlRequest {
	int32 number = 1 [(buf.validate.field).int32.gte = 0];
}

message ProfileGetCustomPaletteImageUploadUrlResponse {
	string upload_token = 1 [(options.zap.hidden) = true];
	common.StorageUrlInfo storage_url_info = 2 [(options.zap.hidden) = true];
	common.Response common_response = 9999;
}

message ProfileEditCustomPaletteRequest {
	string upload_token = 1 [(options.zap.hidden) = true, (buf.validate.field).string.min_bytes = 1];
	int32 number = 2 [(buf.validate.field).int32.gte = 0];
	string custom_palette_preset_layout_group_id = 3;
	common.CustomPaletteBackground background = 4;
	repeated common.CustomPalettePart parts = 5 [(buf.validate.field).repeated.max_items = 100];
}

message ProfileEditCustomPaletteResponse {
	int32 number = 1;
	common.Response common_response = 9999;
}

message ProfileSetCustomPaletteRequest {
	int32 number = 1 [(buf.validate.field).int32.gte = 1];
}

message ProfileDeleteCustomPaletteRequest {
	int32 number = 1 [(buf.validate.field).int32.gte = 1];
}

message ProfileSetNameResponse {
	common.Response common_response = 9999;
}

message ProfileSetMessageResponse {
	common.Response common_response = 9999;
}

message ProfileSetFanMarkResponse {
	common.Response common_response = 9999;
}

message ProfileSwitchPublishSettingResponse {
	common.Response common_response = 9999;
}

message ProfileSetEmblemResponse {
	common.Response common_response = 9999;
}

message ProfileBlockUserResponse {
	common.Response common_response = 9999;
}

message ProfileUnblockUserResponse {
	common.Response common_response = 9999;
}

message ProfileComplainUserResponse {
	common.Response common_response = 9999;
}

message ProfileSetCustomPaletteResponse {
	common.Response common_response = 9999;
}

message ProfileDeleteCustomPaletteResponse {
	common.Response common_response = 9999;
}

message ProfileSetDefaultCustomPaletteResponse {
	common.Response common_response = 9999;
}

service Profile {
	rpc SetName (.rpc.api.ProfileSetNameRequest) returns (.rpc.api.ProfileSetNameResponse) {
		option (google.api.http).post = "/Profile/SetName";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc SetMessage (.rpc.api.ProfileSetMessageRequest) returns (.rpc.api.ProfileSetMessageResponse) {
		option (google.api.http).post = "/Profile/SetMessage";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc SetFanMark (.rpc.api.ProfileSetFanMarkRequest) returns (.rpc.api.ProfileSetFanMarkResponse) {
		option (google.api.http).post = "/Profile/SetFanMark";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc SwitchPublishSetting (.rpc.api.ProfileSwitchPublishSettingRequest) returns (.rpc.api.ProfileSwitchPublishSettingResponse) {
		option (google.api.http).post = "/Profile/SwitchPublishSetting";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc SetEmblem (.rpc.api.ProfileSetEmblemRequest) returns (.rpc.api.ProfileSetEmblemResponse) {
		option (google.api.http).post = "/Profile/SetEmblem";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc GetUserProfileDetail (.rpc.api.ProfileGetUserProfileDetailRequest) returns (.rpc.api.ProfileGetUserProfileDetailResponse) {
		option (google.api.http).post = "/Profile/GetUserProfileDetail";
		option (google.api.http).body = "*";
		option (options.check_option.check).disabled_master_version = true;
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc BlockUser (.rpc.api.ProfileBlockUserRequest) returns (.rpc.api.ProfileBlockUserResponse) {
		option (google.api.http).post = "/Profile/BlockUser";
		option (google.api.http).body = "*";
		option (options.check_option.check).disabled_master_version = true;
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc UnblockUser (.rpc.api.ProfileUnblockUserRequest) returns (.rpc.api.ProfileUnblockUserResponse) {
		option (google.api.http).post = "/Profile/UnblockUser";
		option (google.api.http).body = "*";
		option (options.check_option.check).disabled_master_version = true;
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ListBlockedUser (.google.protobuf.Empty) returns (.rpc.api.ProfileListBlockedUserResponse) {
		option (google.api.http).post = "/Profile/ListBlockedUser";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ComplainUser (.rpc.api.ProfileComplainUserRequest) returns (.rpc.api.ProfileComplainUserResponse) {
		option (google.api.http).post = "/Profile/ComplainUser";
		option (google.api.http).body = "*";
		option (options.check_option.check).disabled_master_version = true;
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ListCustomPalette (.google.protobuf.Empty) returns (.rpc.api.ProfileListCustomPaletteResponse) {
		option (google.api.http).post = "/Profile/ListCustomPalette";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc GetCustomPaletteImageUploadUrl (.rpc.api.ProfileGetCustomPaletteImageUploadUrlRequest) returns (.rpc.api.ProfileGetCustomPaletteImageUploadUrlResponse) {
		option (google.api.http).post = "/Profile/GetCustomPaletteImageUploadUrl";
		option (google.api.http).body = "*";
		option (options.check_option.check).disabled_master_version = true;
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc EditCustomPalette (.rpc.api.ProfileEditCustomPaletteRequest) returns (.rpc.api.ProfileEditCustomPaletteResponse) {
		option (google.api.http).post = "/Profile/EditCustomPalette";
		option (google.api.http).body = "*";
		option (options.check_option.check).disabled_master_version = true;
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc SetCustomPalette (.rpc.api.ProfileSetCustomPaletteRequest) returns (.rpc.api.ProfileSetCustomPaletteResponse) {
		option (google.api.http).post = "/Profile/SetCustomPalette";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc DeleteCustomPalette (.rpc.api.ProfileDeleteCustomPaletteRequest) returns (.rpc.api.ProfileDeleteCustomPaletteResponse) {
		option (google.api.http).post = "/Profile/DeleteCustomPalette";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc SetDefaultCustomPalette (.google.protobuf.Empty) returns (.rpc.api.ProfileSetDefaultCustomPaletteResponse) {
		option (google.api.http).post = "/Profile/SetDefaultCustomPalette";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}
}
