syntax = "proto3";

import "buf/validate/validate.proto";
import "common/reward.gen.proto";
import "google/api/annotations.proto";
import "options/check_option.proto";
import "options/zap.proto";
import "rpc/api/common/response.gen.proto";
import "rpc/api/common/reward.gen.proto";

package rpc.api;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/rpc/api";
option csharp_namespace = "Vision.Common.Proto.Api";

message AnnouncementListRequest {
	int32 offset = 1 [(buf.validate.field).int32.gte = 0];
}

message AnnouncementListResponse {
	message Announcement {
		string id = 1;
		string title = 2;
		string description = 3 [(options.zap.hidden) = true];
		string sender = 4;
		int64 posted_time = 5;
		bool is_read = 6;
		repeated .common.Reward rewards = 7;
	}

	repeated AnnouncementListResponse.Announcement announcements = 1;
	int32 unread_count = 2;
	bool is_next = 3;
	common.Response common_response = 9999;
}

message AnnouncementReadRequest {
	string announcement_id = 1 [(buf.validate.field).string.min_bytes = 1];
}

message AnnouncementReadResponse {
	bool is_discarded_reward = 1;
	repeated common.RewardResult results = 2;
	common.Response common_response = 9999;
}

service Announcement {
	rpc List (.rpc.api.AnnouncementListRequest) returns (.rpc.api.AnnouncementListResponse) {
		option (google.api.http).post = "/Announcement/List";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc Read (.rpc.api.AnnouncementReadRequest) returns (.rpc.api.AnnouncementReadResponse) {
		option (google.api.http).post = "/Announcement/Read";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}
}
