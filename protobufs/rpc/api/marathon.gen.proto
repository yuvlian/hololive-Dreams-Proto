syntax = "proto3";

import "buf/validate/validate.proto";
import "common/reward.gen.proto";
import "entity/master/options/master.proto";
import "enums/card_attribute_type.gen.proto";
import "enums/card_rarity.gen.proto";
import "enums/mini_game_type.gen.proto";
import "enums/tips_hint_type.gen.proto";
import "google/api/annotations.proto";
import "options/check_option.proto";
import "options/zap.proto";
import "rpc/api/common/ranking.gen.proto";
import "rpc/api/common/response.gen.proto";

package rpc.api;

option go_package = "github.com/qua-vision/vision-server/pkg/pb/rpc/api";
option csharp_namespace = "Vision.Common.Proto.Api";

message MarathonTopRequest {
	string marathon_id = 1 [(buf.validate.field).string.min_bytes = 1];
}

message MarathonReadTopRequest {
	string marathon_chapter_id = 1 [(buf.validate.field).string.min_bytes = 1];
}

message MarathonTopResponse {
	message Marathon {
		message MarathonChapter {
			message MarathonScoreReward {
				int64 score = 1;
				repeated .common.Reward rewards = 2;
			}

			string id = 1;
			int32 chapter_number = 2 [(options.zap.hidden) = true];
			string character_id = 3 [(options.master.fk) = "Character:id"];
			int64 end_time = 4 [(options.zap.hidden) = true];
			string score_name = 5 [(options.zap.hidden) = true];
			string score_icon_asset_id = 6 [(options.zap.hidden) = true];
			string marathon_event_badge_item_id = 7 [(options.master.fk) = "Item:id"];
			string marathon_score_ranking_rank_reward_group_id = 8;
			string marathon_music_highest_score_ranking_rank_reward_group_id = 9;
			string marathon_total_music_highest_score_ranking_reward_group_id = 10;
			string marathon_music_score_bonus_group_id = 11;
			string marathon_mini_game_marathon_score_bonus_group_id = 12;
			string marathon_live_marathon_score_bonus_group_id = 13;
			string marathon_mini_game_marathon_score_rate_group_id = 14;
			string mission_group_id = 15 [(options.master.fk) = "MissionGroup:id"];
			repeated MarathonTopResponse.Marathon.MarathonChapter.MarathonScoreReward marathon_score_rewards = 16 [(options.zap.hidden) = true];
			int64 score = 17;
			string event_story_chapter_id = 18 [(options.master.fk) = "EventStoryChapter:id", (options.master.optional) = true];
			string auto_play_story_id = 19 [(options.master.fk) = "Story:id", (options.master.optional) = true];
			string background_asset_id = 20 [(options.zap.hidden) = true];
			string bgm_asset_id = 21 [(options.zap.hidden) = true];
			int64 ranking_reveal_start_time = 22 [(options.zap.hidden) = true];
		}

		message MarathonMiniGameMarathonScoreBonus {
			string group_id = 1;
			int32 number = 2;
			string card_id = 3 [(options.master.fk) = "Card:id", (options.master.optional) = true];
			.enums.CardRarity card_rarity = 4;
			int64 card_potential_upgrade_count = 5;
			int32 marathon_score_quantity_up_permil_up = 6;
		}

		message MarathonLiveMarathonScoreBonus {
			string group_id = 1;
			int32 number = 2;
			string character_id = 3 [(options.master.fk) = "Character:id", (options.master.optional) = true];
			string card_id = 4 [(options.master.fk) = "Card:id", (options.master.optional) = true];
			.enums.CardAttributeType card_attribute_type = 5;
			.enums.CardRarity card_rarity = 6;
			int64 card_potential_upgrade_count = 7;
			int32 marathon_score_quantity_up_permil_up = 8;
		}

		message MarathonMusicScoreBonus {
			string group_id = 1;
			string music_id = 2 [(options.master.fk) = "Music:id"];
			int32 number = 3;
			string character_id = 4 [(options.master.fk) = "Character:id", (options.master.optional) = true];
			string card_id = 5 [(options.master.fk) = "Card:id", (options.master.optional) = true];
			.enums.CardAttributeType card_attribute_type = 6;
			.enums.CardRarity card_rarity = 7;
			int64 card_potential_upgrade_count = 8;
			int32 score_up_permil_up = 9;
		}

		message MarathonMiniGameMarathonScoreRate {
			string group_id = 1;
			.enums.MiniGameType mini_game_type = 2;
			int32 marathon_score_permil_multiply = 3;
			int32 bonus_permil_up = 4;
		}

		message MarathonScoreRankingRankReward {
			string group_id = 1;
			int64 end_rank = 2;
			repeated .common.Reward rewards = 3;
			string marathon_ranking_grade_id = 4 [(options.master.fk) = "MarathonRankingGrade:id"];
		}

		message MarathonMusicHighestScoreRankingRankReward {
			string group_id = 1;
			string music_id = 2 [(options.master.fk) = "Music:id"];
			int64 end_rank = 3;
			repeated .common.Reward rewards = 4;
			string marathon_ranking_grade_id = 5 [(options.master.fk) = "MarathonRankingGrade:id"];
		}

		message MarathonTotalMusicHighestScoreRankingReward {
			string group_id = 1;
			int64 end_rank = 2;
			repeated .common.Reward rewards = 3;
			string marathon_ranking_grade_id = 4 [(options.master.fk) = "MarathonRankingGrade:id"];
		}

		string id = 1;
		int64 start_time = 2 [(options.zap.hidden) = true];
		int64 end_time = 3 [(options.zap.hidden) = true];
		int64 exchange_end_time = 4 [(options.zap.hidden) = true];
		string name = 5 [(options.zap.hidden) = true];
		string logo_asset_id = 6 [(options.zap.hidden) = true];
		string condition_group_id = 7 [(options.master.fk) = "Condition:group_id", (options.master.optional) = true];
		string exchange_booth_group_id = 8 [(options.master.fk) = "ExchangeBoothGroup:id"];
		string mission_group_id = 9 [(options.master.fk) = "MissionGroup:id"];
		int64 aggregation_start_time = 10 [(options.zap.hidden) = true];
		int64 aggregated_ranking_reveal_start_time = 11 [(options.zap.hidden) = true];
		repeated MarathonTopResponse.Marathon.MarathonChapter marathon_chapters = 12;
		repeated MarathonTopResponse.Marathon.MarathonMiniGameMarathonScoreBonus marathon_mini_game_marathon_score_bonuses = 13 [(options.zap.hidden) = true];
		repeated MarathonTopResponse.Marathon.MarathonLiveMarathonScoreBonus marathon_live_marathon_score_bonuses = 14 [(options.zap.hidden) = true];
		repeated MarathonTopResponse.Marathon.MarathonMusicScoreBonus marathon_music_score_bonuses = 15 [(options.zap.hidden) = true];
		repeated MarathonTopResponse.Marathon.MarathonMiniGameMarathonScoreRate marathon_mini_game_marathon_score_rates = 16 [(options.zap.hidden) = true];
		repeated MarathonTopResponse.Marathon.MarathonScoreRankingRankReward marathon_score_ranking_rank_rewards = 17 [(options.zap.hidden) = true];
		repeated MarathonTopResponse.Marathon.MarathonMusicHighestScoreRankingRankReward marathon_music_highest_score_ranking_rank_rewards = 18 [(options.zap.hidden) = true];
		repeated MarathonTopResponse.Marathon.MarathonTotalMusicHighestScoreRankingReward marathon_total_music_highest_score_ranking_rewards = 19 [(options.zap.hidden) = true];
		bool is_marathon_score_ranking_disable = 20 [(options.zap.hidden) = true];
		.enums.TipsHintType tips_hint_type = 21 [(options.zap.hidden) = true];
	}

	message RankingResult {
		message MarathonChapter {
			message MusicHighestScoreRankingRankResult {
				string music_id = 1 [(buf.validate.field).string.min_bytes = 1, (options.master.fk) = "Music:id"];
				int64 rank = 2;
				repeated .common.Reward rewards = 3;
			}

			string marathon_chapter_id = 1 [(buf.validate.field).string.min_bytes = 1];
			int64 marathon_score_rank = 2;
			repeated .common.Reward marathon_score_ranking_rewards = 3;
			repeated MarathonTopResponse.RankingResult.MarathonChapter.MusicHighestScoreRankingRankResult music_highest_score_ranking_rank_results = 4;
			int64 total_music_highest_score_rank = 5;
			repeated .common.Reward total_music_highest_score_ranking_rewards = 6;
		}

		repeated MarathonTopResponse.RankingResult.MarathonChapter marathon_chapters = 1;
	}

	MarathonTopResponse.Marathon marathon = 1;
	MarathonTopResponse.RankingResult ranking_result = 2;
	common.Response common_response = 9999;
}

message MarathonListMusicHighestScoreRankingTopRequest {
	string marathon_chapter_id = 1 [(buf.validate.field).string.min_bytes = 1];
	string music_id = 2 [(buf.validate.field).string.min_bytes = 1];
}

message MarathonListMusicHighestScoreRankingTopResponse {
	MarathonMusicScoreRankingResult ranking_result = 1;
	common.Response common_response = 9999;
}

message MarathonListMusicHighestScoreRankingGradeRequest {
	string marathon_chapter_id = 1 [(buf.validate.field).string.min_bytes = 1];
	string music_id = 2 [(buf.validate.field).string.min_bytes = 1];
}

message MarathonListMusicHighestScoreRankingGradeResponse {
	MarathonMusicScoreRankingResult ranking_result = 1;
	common.Response common_response = 9999;
}

message MarathonListMusicHighestScoreRankingAroundSelfRequest {
	string marathon_chapter_id = 1 [(buf.validate.field).string.min_bytes = 1];
	string music_id = 2 [(buf.validate.field).string.min_bytes = 1];
}

message MarathonListMusicHighestScoreRankingAroundSelfResponse {
	MarathonMusicScoreRankingResult ranking_result = 1;
	common.Response common_response = 9999;
}

message MarathonListMarathonScoreRankingTopRequest {
	string marathon_chapter_id = 1 [(buf.validate.field).string.min_bytes = 1];
}

message MarathonListMarathonScoreRankingTopResponse {
	MarathonScoreRankingResult result = 1;
	common.Response common_response = 9999;
}

message MarathonListMarathonScoreRankingGradeRequest {
	string marathon_chapter_id = 1 [(buf.validate.field).string.min_bytes = 1];
}

message MarathonListMarathonScoreRankingGradeResponse {
	MarathonScoreRankingResult result = 1;
	common.Response common_response = 9999;
}

message MarathonListMarathonScoreRankingAroundSelfRequest {
	string marathon_chapter_id = 1 [(buf.validate.field).string.min_bytes = 1];
}

message MarathonListMarathonScoreRankingAroundSelfResponse {
	MarathonScoreRankingResult result = 1;
	common.Response common_response = 9999;
}

message MarathonListTotalMusicHighestScoreRankingTopRequest {
	string marathon_chapter_id = 1 [(buf.validate.field).string.min_bytes = 1];
}

message MarathonListTotalMusicHighestScoreRankingTopResponse {
	MarathonTotalMusicScoreRankingResult result = 1;
	common.Response common_response = 9999;
}

message MarathonListTotalMusicHighestScoreRankingGradeRequest {
	string marathon_chapter_id = 1 [(buf.validate.field).string.min_bytes = 1];
}

message MarathonListTotalMusicHighestScoreRankingGradeResponse {
	MarathonTotalMusicScoreRankingResult result = 1;
	common.Response common_response = 9999;
}

message MarathonListTotalMusicHighestScoreRankingAroundSelfRequest {
	string marathon_chapter_id = 1 [(buf.validate.field).string.min_bytes = 1];
}

message MarathonListTotalMusicHighestScoreRankingAroundSelfResponse {
	MarathonTotalMusicScoreRankingResult result = 1;
	common.Response common_response = 9999;
}

message MarathonTotalMusicScoreRankingResult {
	int32 self_rank = 1;
	int64 self_score = 2;
	bool is_self_rank_out_of_range = 3;
	repeated common.BasicRankingRankInfo rank_infos = 4 [(options.zap.hidden) = true];
}

message MarathonMusicScoreRankingResult {
	int32 self_rank = 1;
	int64 self_score = 2;
	bool is_self_rank_out_of_range = 3;
	repeated common.BasicRankingRankInfo rank_infos = 4 [(options.zap.hidden) = true];
}

message MarathonScoreRankingResult {
	int32 self_rank = 1;
	int64 self_score = 2;
	bool is_self_rank_out_of_range = 3;
	repeated common.BasicRankingRankInfo rank_infos = 4 [(options.zap.hidden) = true];
}

message MarathonReadTopResponse {
	common.Response common_response = 9999;
}

service Marathon {
	rpc Top (.rpc.api.MarathonTopRequest) returns (.rpc.api.MarathonTopResponse) {
		option (google.api.http).post = "/Marathon/Top";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ReadTop (.rpc.api.MarathonReadTopRequest) returns (.rpc.api.MarathonReadTopResponse) {
		option (google.api.http).post = "/Marathon/ReadTop";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ListMusicHighestScoreRankingGrade (.rpc.api.MarathonListMusicHighestScoreRankingGradeRequest) returns (.rpc.api.MarathonListMusicHighestScoreRankingGradeResponse) {
		option (google.api.http).post = "/Marathon/ListMusicHighestScoreRankingGrade";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ListMusicHighestScoreRankingTop (.rpc.api.MarathonListMusicHighestScoreRankingTopRequest) returns (.rpc.api.MarathonListMusicHighestScoreRankingTopResponse) {
		option (google.api.http).post = "/Marathon/ListMusicHighestScoreRankingTop";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ListMusicHighestScoreRankingAroundSelf (.rpc.api.MarathonListMusicHighestScoreRankingAroundSelfRequest) returns (.rpc.api.MarathonListMusicHighestScoreRankingAroundSelfResponse) {
		option (google.api.http).post = "/Marathon/ListMusicHighestScoreRankingAroundSelf";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ListMarathonScoreRankingGrade (.rpc.api.MarathonListMarathonScoreRankingGradeRequest) returns (.rpc.api.MarathonListMarathonScoreRankingGradeResponse) {
		option (google.api.http).post = "/Marathon/ListMarathonScoreRankingGrade";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ListMarathonScoreRankingTop (.rpc.api.MarathonListMarathonScoreRankingTopRequest) returns (.rpc.api.MarathonListMarathonScoreRankingTopResponse) {
		option (google.api.http).post = "/Marathon/ListMarathonScoreRankingTop";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ListMarathonScoreRankingAroundSelf (.rpc.api.MarathonListMarathonScoreRankingAroundSelfRequest) returns (.rpc.api.MarathonListMarathonScoreRankingAroundSelfResponse) {
		option (google.api.http).post = "/Marathon/ListMarathonScoreRankingAroundSelf";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ListTotalMusicHighestScoreRankingGrade (.rpc.api.MarathonListTotalMusicHighestScoreRankingGradeRequest) returns (.rpc.api.MarathonListTotalMusicHighestScoreRankingGradeResponse) {
		option (google.api.http).post = "/Marathon/ListTotalMusicHighestScoreRankingGrade";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ListTotalMusicHighestScoreRankingTop (.rpc.api.MarathonListTotalMusicHighestScoreRankingTopRequest) returns (.rpc.api.MarathonListTotalMusicHighestScoreRankingTopResponse) {
		option (google.api.http).post = "/Marathon/ListTotalMusicHighestScoreRankingTop";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}

	rpc ListTotalMusicHighestScoreRankingAroundSelf (.rpc.api.MarathonListTotalMusicHighestScoreRankingAroundSelfRequest) returns (.rpc.api.MarathonListTotalMusicHighestScoreRankingAroundSelfResponse) {
		option (google.api.http).post = "/Marathon/ListTotalMusicHighestScoreRankingAroundSelf";
		option (google.api.http).body = "*";
		option (options.check_option.check).enabled_response_cache = true;
	}
}
